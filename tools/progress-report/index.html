function bindProfileForm(){const f=$("#profileForm");if(!f)return;f.onsubmit=async e=>{e.preventDefault();const fd=new FormData(f);let p=currentProfileId==="new"?{id:uid("profile"),createdAt:new Date().toISOString(),plans:[]}:profile();p.plans ||= [];Object.assign(p,{projectName:fd.get("projectName"),projectLocation:fd.get("projectLocation"),ownerName:fd.get("ownerName"),clientName:fd.get("clientName"),estimatorName:fd.get("estimatorName"),teamName:fd.get("teamName")||"Tim ICS",companyName:fd.get("companyName"),picName:fd.get("picName"),picContact:fd.get("picContact"),defaultNotes:fd.get("defaultNotes"),updatedAt:new Date().toISOString()});const logo=fd.get("logo");if(logo&&logo.size)p.companyLogoUrl=await imageToData(logo,500,.82);const remove=fd.getAll("removePlan");p.plans=p.plans.filter(pl=>!remove.includes(pl.id)).map(pl=>({...pl,name:(fd.get(`planName_${pl.id}`)||pl.name).trim()}));let added=0;for(const file of fd.getAll("plans")){if(!file||!file.size)continue;if(isPdfFile(file)&&file.size>1800000){alert(`${file.name} terlalu besar untuk standalone. Kompres PDF atau pakai JPG/PNG.`);continue}const type=normalizedType(file);const name=askPlanName(file,p.plans.length+added+1);p.plans.push({id:uid("plan"),name,type,url:isImageFile(file)?await imageToData(file,1400,.8):await fileToData(file),fileName:file.name});added++}if(currentProfileId==="new")db.profiles.push(p);currentProfileId=p.id;if(save())go("profiles")}}

function bindPhotoForm(){const f=$("#photoForm");if(!f)return;const ph=db.photos.find(x=>x.id===currentPhotoId);if(!ph)return;const persist=()=>{ph.backgroundPlanId=ph.planId;save()};const updateRotation=v=>{ph.planRotation=((Number(v)%360)+360)%360;f.planRotation.value=ph.planRotation;$("#rotationReadout").textContent=`${Math.round(ph.planRotation)} deg - tersimpan otomatis`;renderPin(ph);persist()};f.planRotation.oninput=()=>updateRotation(f.planRotation.value);$$("[data-rot]",f).forEach(b=>b.onclick=()=>{const step=Number(b.dataset.rot);updateRotation(step===0?0:(Number(f.planRotation.value)||0)+step)});f.planId.onchange=()=>{ph.planId=f.planId.value;ph.backgroundPlanId=ph.planId;ph.planX=.5;ph.planY=.5;persist();render()};f.onsubmit=e=>{e.preventDefault();const fd=new FormData(f);Object.assign(ph,{photoNumber:Number(fd.get("photoNumber")),category:fd.get("category"),planId:fd.get("planId"),backgroundPlanId:fd.get("planId"),gpsText:fd.get("gpsText"),locationLabel:fd.get("locationLabel"),description:fd.get("description"),planRotation:Number(fd.get("planRotation"))});save();go("photos",{profileId:ph.projectId})};bindMarkerDrag($("#tagPlan"),ph,persist)}
function bindMarkerDrag(plan,ph,onSave=()=>{}){if(!plan||!ph)return;const surface=$(".plan-surface",plan)||plan;const setFrom=e=>{const r=surface.getBoundingClientRect();ph.planX=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));ph.planY=Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));renderPin(ph)};surface.onclick=e=>{if(e.target.classList.contains("pin"))return;setFrom(e);onSave()};const pin=$(`[data-pin="${ph.id}"]`,surface);if(!pin)return;pin.onpointerdown=e=>{e.preventDefault();e.stopPropagation();plan.classList.add("dragging");pin.setPointerCapture(e.pointerId);const move=m=>setFrom(m);const up=()=>{plan.classList.remove("dragging");pin.removeEventListener("pointermove",move);onSave()};pin.addEventListener("pointermove",move);pin.addEventListener("pointerup",up,{once:true});pin.addEventListener("pointercancel",up,{once:true})}}
function planHtml(plan,markers="",id=""){if(!plan)return `<div class="plan" ${id?`id="${id}"`:""}><div class="plan-empty">Denah belum diupload di Data Proyek.</div></div>`;return `<div class="plan" ${id?`id="${id}"`:""}><div class="plan-surface">${plan.type&&plan.type.includes("pdf")?`<embed src="${plan.url}" type="application/pdf">`:`<img src="${plan.url}" alt="${esc(plan.name)}">`}${markers}</div></div>`}
function photoWatermark(ph){return ph.watermarkText||`${compactDateTime(ph.takenAt||new Date())} | ${compactLocation(ph.gpsText)}`}
function compactDateTime(v){const d=new Date(v);const pad=n=>String(n).padStart(2,"0");return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${String(d.getFullYear()).slice(-2)} ${pad(d.getHours())}:${pad(d.getMinutes())}`}
function compactLocation(v){const raw=String(v||"").replace(/^(gps|alamat|lokasi)\s*:?\s*/i,"").trim();if(!raw)return"Alamat/GPS -";const street=streetFromAddress(raw);if(street)return street;const nums=raw.match(/-?\d+(?:\.\d+)?/g);if(nums&&nums.length>=2)return`${Number(nums[0]).toFixed(5)},${Number(nums[1]).toFixed(5)}`;return trimCompact(raw,44)}
function streetFromAddress(v){const clean=String(v||"").replace(/-?\d+\.\d+\s*,\s*-?\d+\.\d+/g,"").replace(/\s+/g," ").trim();if(!clean)return"";const pieces=clean.split(/[|;\n,]/).map(x=>x.trim()).filter(Boolean);const streetLike=/(^|\b)(jl\.?|jalan|gg\.?|gang|komplek|komp\.?|perumahan|perum\.?|ruko|blok)\b/i;let hit=pieces.find(x=>streetLike.test(x))||"";if(!hit&&streetLike.test(clean))hit=clean.split(/(?:\bkel\.?|\bkelurahan|\bkec\.?|\bkecamatan|\bkota|\bkab\.?|\bkabupaten|\bprov\.?|\bprovinsi|\bindonesia)\b/i)[0].trim();if(!hit&&pieces[0]&&/[a-z]/i.test(pieces[0])&&!/^-?\d/.test(pieces[0]))hit=pieces[0];hit=hit.replace(/\b(rt|rw)\s*\.?\s*\d+.*$/i,"").replace(/\b(kel\.?|kelurahan|kec\.?|kecamatan|kota|kab\.?|kabupaten|prov\.?|provinsi|indonesia)\b.*$/i,"").replace(/\b\d{5}\b/g,"").replace(/\s{2,}/g," ").replace(/\s*[-,]\s*$/,"").trim();return trimCompact(hit,44)}
function trimCompact(v,max=44){const s=String(v||"").trim();return s.length>max?s.slice(0,max-3).trim()+"...":s}
function photoSnapshot(ph){return{id:ph.id,projectId:ph.projectId,planId:ph.planId,backgroundPlanId:ph.backgroundPlanId||ph.planId,photoNumber:ph.photoNumber,fileUrl:ph.fileUrl,takenAt:ph.takenAt,description:ph.description,locationLabel:ph.locationLabel,category:ph.category,gpsText:ph.gpsText,watermarkText:photoWatermark(ph),planX:ph.planX,planY:ph.planY,planRotation:ph.planRotation}}

function viewReportBuilder(){const editing=db.reports.find(x=>x.id===currentReportId);const selected=editing?profile(editing.projectId):(profile()||db.profiles[0]);if(selected)currentProfileId=selected.id;const p=selected;const last=p?reports(p.id).filter(r=>!editing||r.id!==editing.id).at(-1):null;const prev=editing?Number(editing.progressPrevious||0):Number(last?.progressCurrent||0);const cur=editing?Number(editing.progressCurrent||prev):prev;const start=editing?.startDate||(last?addDays(last.endDate,1):today());const end=editing?.endDate||(last?addDays(last.endDate,7):addDays(today(),6));const week=editing?.weekNumber||(last?(last.weekNumber||0)+1:1);const status=editing?.status||"draft";const attachmentHint=editing?.progressAttachment?`<div class="muted">Lampiran saat ini: ${esc(editing.progressAttachment.name)}. Upload PDF baru jika ingin mengganti.</div>`:`<div class="muted">PDF saja. Lampiran ini akan dirender ke gambar agar aman saat export.</div>`;return `<section><div class="toolbar"><div class="title"><h1>${editing?"Revisi":"Buat"} Laporan Mingguan</h1><p>${editing?"Edit data yang perlu direvisi, lalu simpan ulang preview laporan.":"Pilih proyek, isi data minggu ini, pilih foto, lalu buat preview laporan."}</p></div><div class="nav"><button class="btn" onclick="${editing?`go('preview',{reportId:'${editing.id}',profileId:'${editing.projectId}'})`:"go('profiles')"}">Kembali</button><button class="btn" onclick="go('photos',{profileId:'${p?.id||""}',fromReport:true})" ${p?"":"disabled"}>Foto Lapangan</button></div></div><div class="grid"><div class="card pad span5"><form class="form" id="reportForm"><div class="form-section"><h2>1. Pilih Proyek</h2></div><div class="field full"><label>Pilih proyek</label><select class="select" name="projectId" id="projectSelect" ${editing?"disabled":""}>${db.profiles.map(x=>`<option value="${x.id}" ${p&&p.id===x.id?"selected":""}>${esc(x.projectName)}</option>`).join("")}</select><input type="hidden" name="projectIdFixed" val function projectSnapshotBox(p){return `<div class="field full"><div class="snapshot"><div class="snap"><small>Nama Proyek</small><strong>${esc(p.projectName)}</strong></div><div class="snap"><small>Lokasi</small><strong>${esc(p.projectLocation||"-")}</strong></div><div class="snap"><small>Owner/client</small><strong>${esc(p.ownerName||p.clientName||"-")}</strong></div><div class="snap"><small>Estimator</small><strong>${esc(p.estimatorName||"-")}</strong></div><div class="snap"><small>Tim</small><strong>${esc(p.teamName||"-")}</strong></div><div class="snap"><small>Denah/foto</small><strong>${plans(p).length} denah, ${photos(p.id).length} foto</strong></div></div></div>`}
function photoPickRow(ph,i,editing=null){const st=photoStatus(ph),selectedIds=editing?.selectedPhotoIds||editing?.photoSnapshots?.map(p=>p.id)||[],checked=!editing||selectedIds.includes(ph.id),order=editing&&selectedIds.includes(ph.id)?selectedIds.indexOf(ph.id)+1:i+1;return `<label class="photo-row"><div class="photo-frame thumb"><img src="${ph.fileUrl}"><div class="watermark">${esc(photoWatermark(ph))}</div></div><div><strong>Foto No. ${String(ph.photoNumber).padStart(2,"0")}</strong><div class="meta">${esc(ph.locationLabel||"-")} - ${esc(planName(ph.planId,ph.projectId))}</div><span class="status ${st.ok?"":"bad"}">${esc(st.ok?"Lengkap":st.text)}</span></div><div><input type="checkbox" name="selectedPhotoIds" value="${ph.id}" ${checked?"checked":""} form="reportForm"><label class="muted" style="display:block;margin-top:8px">Urutan di laporan</label><input class="input" style="width:78px;margin-top:4px" type="number" name="order_${ph.id}" value="${order}" form="reportForm"></div></label>`}
function bindReportForm(){const sel=$("#projectSelect");if(sel&&!sel.disabled)sel.onchange=()=>go("report",{profileId:sel.value});const f=$("#reportForm");if(!f)return;const editing=db.reports.find(x=>x.id===currentReportId);const updateDelta=()=>{const out=$("#deltaReadout");if(out)out.textContent=fmtDelta((Number(f.progressCurrent.value)||0)-(Number(f.progressPrevious.value)||0))};if(f.progressPrevious&&f.progressCurrent){f.progressPrevious.oninput=updateDelta;f.progressCurrent.oninput=updateDelta;updateDelta()}f.onsubmit=async e=>{e.preventDefault();const fd=new FormData(f);const projectId=fd.get("projectId")||fd.get("projectIdFixed")||editing?.projectId;const p=profile(projectId);if(!p)return;const selected=fd.getAll("selectedPhotoIds").sort((a,b)=>(Number(fd.get(`order_${a}`))||9999)-(Number(fd.get(`order_${b}`))||9999));const snappedPhotos=selected.map(id=>db.photos.find(ph=>ph.id===id)).filter(Boolean).map(photoSnapshot);const progressPrevious=Number(fd.get("progressPrevious"));const progressCurrent=Number(fd.get("progressCurrent"));const progressDelta=progressCurrent-progressPrevious;const warnings=[];if(!plans(p).length)warnings.push("Denah proyek belum ada.");if(!snappedPhotos.length)warnings.push("Belum ada foto yang dipilih.");if(snappedPhotos.some(ph=>!ph.description))warnings.push("Ada foto tanpa deskripsi.");if(snappedPhotos.some(ph=>!ph.locationLabel))warnings.push("Ada foto tanpa lokasi/area.");if(fd.get("progressPrevious")===""||fd.get("progressCurrent")===""||!Number.isFinite(progressPrevious)||!Number.isFinite(progressCurrent))warnings.push("Progress mingguan belum diisi.");if(fd.get("status")==="final"&&warnings.length){alert("Status final wajib lengkap:\\n- "+warnings.join("\\n- "));return}if(warnings.length&&!confirm("Ada warning sebelum preview:\\n- "+warnings.join("\\n- ")+"\\n\\nLanjut buat preview?"))return;const usedPlanIds=[...new Set(snappedPhotos.map(ph=>ph.planId).filter(Boolean))];let progressAttachment=editing?.progressAttachment||null;const pf=fd.get("progressFile");if(pf&&pf.size){if(pf.size>2200000){alert("File progress terlalu besar untuk standalone. Kompres PDF/Excel dulu.");return}const type=normalizedType(pf);progressAttachment={name:pf.name,type,url:isImageFile(pf)?await imageToData(pf,1500,.82):await fileToData(pf)}}const payload={projectId:p.id,projectNameSnapshot:p.projectName,projectLocationSnapshot:p.projectLocation,ownerNameSnapshot:p.ownerName,clientNameSnapshot:p.clientName,estimatorNameSnapshot:p.estimatorName,teamNameSnapshot:p.teamName,companyNameSnapshot:p.companyName,companyLogoSnapshot:p.companyLogoUrl||"",picNameSnapshot:p.picName||"",picContactSnapshot:p.picContact||"",planSnapshots:usedPlanIds.map(id=>planSnapshot(plans(p).find(pl=>pl.id===id))).filter(Boolean),progressAttachment,startDate:fd.get("startDate"),endDate:fd.get("endDate"),weekNumber:Number(fd.get("weekNumber"))||1,progressPrevious,progressCurrent,progressDelta,summary:fd.get("summary"),notes:fd.get("notes"),followUp:fd.get("followUp"),selectedPhotoIds:selected,photoSnapshots:snappedPhotos,status:fd.get("status"),updatedAt:new Date().toISOString()};const r=editing?Object.assign(editing,payload):{id:uid("report"),...payload,createdAt:new Date().toISOString()};if(!editing)db.reports.push(r);currentReportId=r.id;if(save())go("preview",{reportId:r.id,profileId:p.id})}}
function normalizeProgressUploadUi(){const input=$('input[name="progressFile"]');if(!input)return;input.accept="application/pdf,.pdf";const label=input.closest(".field")?.querySelector("label");if(label)label.textContent="Upload lampiran Weekly PDF optional";input.onchange=()=>{const f=input.files?.[0];if(f&&!isPdfFile(f)){alert("Lampiran Weekly harus file PDF, bukan gambar/screenshot/Excel.");input.value=""}};const form=$("#reportForm");if(form&&!form.dataset.pdfGuard){form.dataset.pdfGuard="1";form.addEventListener("submit",e=>{const f=input.files?.[0];if(f&&!isPdfFile(f)){e.preventDefault();e.stopImmediatePropagation();alert("Lampiran Weekly harus file PDF, bukan gambar/screenshot/Excel.");input.value=""}},true)}}
function viewPreview(){const r=db.reports.find(x=>x.id===currentReportId)||db.reports.at(-1);if(!r)return missing();const ps=(r.photoSnapshots&&r.photoSnapshots.length?r.photoSnapshots:(r.selectedPhotoIds||[]).map(id=>db.photos.find(p=>p.id===id)).filter(Boolean).map(photoSnapshot));return `<section><div class="toolbar no-print"><div class="title"><h1>Preview Laporan</h1><p>Weekly Report memakai snapshot Daily Report, foto, dan detail saat sync/generate dibuat.</p></div><div class="nav"><button class="btn" onclick="go('reports')">Kembali</button>${r.source==="daily-weekly"?"":`<button class="btn" onclick="go('report',{reportId:'${r.id}',profileId:'${r.projectId}'})">Revisi Laporan</button>`}<button class="btn" onclick="syncDailyIntoProgress();save();go('reports')">Sync Daily</button><button class="btn primary" onclick="printReportPdf()">Export / Simpan PDF</button></div></div><div class="print-tip no-print"><strong>Untuk Android:</strong> pilih Print / Cetak -> Save as PDF -> ukuran kertas A4 -> orientasi Portrait -> aktifkan Background graphics jika tersedia. Nama file otomatis: <b>${esc(reportPdfName(r))}</b>.</div><div class="card pad no-print" style="margin-bottom:14px"><h2>Cek Sebelum Export</h2><div class="qc">${qc(r,ps).map(x=>`<div class="${x.ok?"":"bad"}"><span>${x.label}</span><strong>${x.ok?"OK":"Warning"}</strong></div>`).join("")}</div></div><div class="report-pages">${reportPages(r,ps)}</div></section>`}
function qc(r,ps){return[{label:"Data proyek tersimpan",ok:!!r.projectNameSnapshot},{label:"Progress minggu lalu dan minggu ini terisi",ok:Number.isFinite(Number(r.progressPrevious))&&Number.isFinite(Number(r.progressCurrent))},{label:"Periode laporan terisi",ok:!!r.startDate&&!!r.endDate},{label:"Denah proyek tersedia",ok:(r.planSnapshots||[]).length>0},{label:"Foto dipilih",ok:ps.length>0},{label:"Semua foto punya lokasi/area",ok:ps.every(p=>!!p.locationLabel)},{label:"Semua foto punya deskripsi",ok:ps.every(p=>!!p.description)}]}
function reportPages(r,ps){const chunks=[];for(let i=0;i<Math.max(ps.length,1);i+=3){const group=ps.slice(i,i+3);while(group.length<3)group.push(null);chunks.push(group)}const planPages=(r.planSnapshots||[]).map(pl=>planReportPage(pl,ps.filter(p=>p.planId===pl.id),r)).join("");return `<section class="paper cover">${r.companyLogoSnapshot?`<img class="cover-logo" src="${r.companyLogoSnapshot}" alt="Logo">`:`<img class="cover-logo" src="${DEFAULT_LOGO_URL}" alt="Logo">`}<div><div class="kicker">Laporan Mingguan</div><h1>Weekly Report Proyek</h1><h2>${esc(r.projectNameSnapshot)}</h2></div><div class="cover-grid"><div class="cover-box"><small>Minggu</small><strong>Ke-${r.weekNumber}</strong></div><div class="cover-box"><small>Periode</small><strong>${fmtDate(r.startDate)} - ${fmtDate(r.endDate)}</strong></div><div class="cover-box"><small>Lokasi</small><strong>${esc(r.projectLocationSnapshot||"-")}</strong></div><div class="cover-box"><small>Owner/client</small><strong>${esc(r.ownerNameSnapshot||r.clientNameSnapshot||"-")}</strong></div><div class="cover-box"><small>Estimator</small><strong>${esc(r.estimatorNameSnapshot||"-")}</strong></div><div class="cover-box"><small>Dibuat oleh</small><strong>${esc(r.teamNameSnapshot||"-")}</strong></div><div class="cover-box"><small>Tanggal dibuat</small><strong>${fmtDate(today())}</strong></div></div>${footerHtml(r)}</section>${summaryPages(r)}${attachmentReportPages(r)}${planPages||`<section class="paper"><div class="kicker">Denah</div><h2>Denah belum tersedia</h2>${footerHtml(r)}</section>`}${chunks.map((g,i)=>`<section class="paper"><div class="kicker">Dokumentasi Foto</div><h2>Foto Weekly - Halaman ${i+1}</h2>${g.map(p=>photoReportBlock(p,r)).join("")}${footerHtml(r)}</section>`).join("")}`}
function summaryPages(r){const cards=summaryCards(r);const pages=[];let first=[progressCard(r),...cards.splice(0,1)];pages.push(summaryPaper(r,false,first));while(cards.length)pages.push(summaryPaper(r,true,cards.splice(0,2)));return pages.join("")}
function summaryCards(r){return[{title:"Summary Mingguan",text:r.summary||"-"},{title:"Notes / Logs / Kendala",text:r.notes||"-"},{title:"Follow-up / Tindak Lanjut",text:r.followUp||"-"}].flatMap(s=>splitText(s.text,760).map((text,i)=>({title:i?`${s.title} (lanjutan)`:s.title,text})))}
function progressCard(r){return `<div class="summary-card"><h3>Progress dari Daily</h3><div class="summary-progress"><div class="summary-box"><small>Minggu lalu</small><strong>${fmtPct(r.progressPrevious)}</strong></div><div class="summary-box"><small>Minggu ini</small><strong>${fmtPct(r.progressCurrent)}</strong></div><div class="summary-box"><small>Kenaikan</small><strong>${fmtDelta(r.progressDelta)}</strong></div></div>${attachmentRef(r.progressAttachment)}</div>`}
function summaryPaper(r,continued,cards){return `<section class="paper"><h2>${continued?"Ringkasan Mingguan - Lanjutan":"Ringkasan Mingguan"}</h2><p>${fmtDate(r.startDate)} - ${fmtDate(r.endDate)}</p>${cards.map(c=>typeof c==="string"?c:`<div class="summary-card"><h3>${esc(c.title)}</h3><p>${esc(c.text)}</p></div>`).join("")}${footerHtml(r)}</section>`}
function splitText(v,max=760){const s=String(v||"-").trim()||"-";if(s.length<=max)return[s];const parts=[];let rest=s;while(rest.length>max){let cut=rest.lastIndexOf("\n",max);if(cut<max*.45)cut=rest.lastIndexOf(". ",max);if(cut<max*.45)cut=rest.lastIndexOf(" ",max);if(cut<max*.45)cut=max;parts.push(rest.slice(0,cut).trim());rest=rest.slice(cut).trim()}if(rest)parts.push(rest);return parts}
function pdfDisplayUrl(a){return `${dataUrlToBlobUrl(a.url)}#toolbar=0&navpanes=0&scrollbar=0&page=1&view=FitH&zoom=page-width`}
function attachmentReportPages(r){const a=r.progressAttachment;if(!a)return"";if(a.renderedPages?.length)return a.renderedPages.map((src,i)=>`<section class="paper attachment-paper"><div class="kicker">Lampiran Progress</div><h2>Dokumen Progress dari Daily${a.renderedPages.length>1?` - Halaman ${i+1}`:""}</h2><p class="progress-attachment-note">${esc(a.name)}</p><img class="progress-rendered-page" src="${src}" alt="Lampiran progress halaman ${i+1}">${footerHtml(r)}</section>`).join("");return `<section class="paper attachment-paper"><div class="kicker">Lampiran Progress</div><h2>Dokumen Progress dari Daily</h2><p class="progress-attachment-note">${esc(a.name)}</p>${attachmentPreview(a)}${footerHtml(r)}</section>`}
function attachmentPreview(a){if(!a)return `<div class="attachment-box"><div><strong>Belum ada file Weekly</strong><p>Upload PDF tambahan hanya bila diperlukan dari data Weekly lama.</p></div></div>`;if(!String(a.type||"").includes("pdf"))return `<div class="attachment-box"><div><strong>File ditolak</strong><p>Lampiran Weekly harus PDF.</p></div></div>`;if(a.renderStatus==="rendering")return `<div class="attachment-box"><div><strong>Menyiapkan lampiran PDF...</strong><p>PDF sedang dirender menjadi gambar agar bisa ikut tampil di hasil export.</p></div></div>`;if(a.renderStatus==="failed")return `<div class="attachment-box"><div><strong>PDF gagal dirender</strong><p>${esc(a.renderError||"Coba reload, pastikan internet aktif untuk memuat PDF renderer, lalu buka preview lagi.")}</p></div></div>`;return `<div class="attachment-box"><div><strong>Menyiapkan lampiran PDF...</strong><p>Jika proses tidak mulai, reload halaman preview.</p></div></div>`}
function attachmentRef(a){return a?`<p style="margin-top:10px;color:#747061">Lampiran Weekly: ${esc(a.name)}</p>`:""}
function footerHtml(r){return `<footer class="pdf-footer"><span>IC Solution</span><span>${esc(r.projectNameSnapshot||"Laporan")}</span><span>${fmtDate(r.startDate)} - ${fmtDate(r.endDate)}</span></footer>`}
function planReportPage(pl,ps,r){return `<section class="paper"><div class="kicker">Denah Dengan Marker Foto</div><h2>${esc(pl.name)}</h2>${planHtml(pl,ps.map(pinHtml).join(""))}${footerHtml(r)}</section>`}
function photoReportBlock(p,r){if(!p)return `<article class="photo-block photo-empty"><div></div><div></div></article>`;const locationPlan=(r.planSnapshots||[]).find(x=>x.id===p.planId);const mini=locationPlan&&!(locationPlan.type||"").includes("pdf")?`<div class="mini-report">${planHtml(locationPlan,pinHtml({...p,planId:locationPlan.id}))}</div>`:"";return `<article class="photo-block"><div class="photo-frame"><img src="${p.fileUrl}"><div class="watermark">${esc(p.watermarkText||photoWatermark(p))}</div></div><div><h3>Foto No. ${String(p.photoNumber).padStart(2,"0")}</h3><p><b>Tanggal:</b> ${fmtDateTime(p.takenAt)}</p><p><b>Denah:</b> ${esc(locationPlan?.name||"-")}</p><p><b>Lokasi:</b> ${esc(p.locationLabel||"-")}</p><p><b>Kategori:</b> ${esc(p.category||"-")}</p><p><b>Deskripsi:</b><br>${esc(p.description||"-")}</p>${mini}</div></article>`}
function missing(){return `<section><div class="card empty"><h3>Data tidak ditemukan</h3><p>Kembali ke Project Profile.</p></div></section>`}
async function addPhotos(files){const p=profile();if(!p)return;const planId=currentPlanViewId||plans(p)[0]?.id||"";for(const file of Array.from(files)){db.photos.push({id:uid("photo"),projectId:p.id,planId,backgroundPlanId:planId,photoNumber:nextPhoto(p.id),fileUrl:await imageToData(file,1000,.74),takenAt:new Date().toISOString(),gpsText:"",description:"",locationLabel:"",category:"Progress",planX:.5,planY:.5,planRotation:0,createdAt:new Date().toISOString()})}save();render()}
function deletePhoto(id){if(!confirm("Hapus foto ini? Laporan lama tetap aman karena menyimpan data saat laporan dibuat."))return;db.photos=db.photos.filter(p=>p.id!==id);save();go("photos")}
function deleteReport(id){if(!confirm("Hapus report dari archive lokal?"))return;db.reports=db.reports.filter(r=>r.id!==id);save();go("reports")}
function exportBackup(){const blob=new Blob([JSON.stringify({...db,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`ics-report-backup-${today()}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function restoreBackup(file){if(!file)return;try{const incoming=JSON.parse(await file.text());incoming.profiles ||= [];incoming.photos ||= [];incoming.reports ||= [];db={profiles:incoming.profiles,photos:incoming.photos,reports:incoming.reports};migrate();validateDbShape(db);if(!confirm("Restore akan mengganti database lokal di browser ini. Lanjut?"))return;save();currentProfileId=db.profiles[0]?.id||"";currentReportId="";go("profiles")}catch(e){alert(`Restore gagal: ${e.message}`)}}
function fileToData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{let out=String(r.result||"");if(out.startsWith("data:;base64,"))out=out.replace("data:;base64,",`data:${normalizedType(file)};base64,`);res(out)};r.onerror=rej;r.readAsDataURL(file)})}
function imageToData(file,max=1000,q=.74){return new Promise((res,rej)=>{const r=new FileReader();r.onerror=rej;r.onload=()=>{const im=new Image();im.onerror=rej;im.onload=()=>{const s=Math.min(1,max/Math.max(im.naturalWidth,im.naturalHeight));const c=document.createElement("canvas");c.width=Math.max(1,Math.round(im.naturalWidth*s));c.height=Math.max(1,Math.round(im.naturalHeight*s));c.getContext("2d").drawImage(im,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",q))};im.src=r.result};r.readAsDataURL(file)})}
document.addEventListener("change",e=>{if(e.target.id==="photoCameraInput"||e.target.id==="photoUploadInput")addPhotos(e.target.files);if(e.target.id==="restoreInput")restoreBackup(e.target.files?.[0])});
load().then(render);
</script>
