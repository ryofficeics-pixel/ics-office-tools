<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#f0efe9;--surface:#fff;--surface2:#e8e7e0;--dark:#1a1a1a;--muted:#747061;--border:rgba(26,26,26,.14);--danger:#c0392b;--ok:#2d7a4a;--shadow:0 4px 24px rgba(0,0,0,.08)}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{background:var(--bg);color:var(--dark);font-family:"DM Sans",Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.top{position:sticky;top:0;z-index:10;background:rgba(240,239,233,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}.top-inner{width:min(1180px,100%);margin:auto;padding:12px clamp(14px,4vw,24px);display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:flex;align-items:center;gap:10px}.mark{width:42px;height:42px;border-radius:14px;background:#111;display:grid;place-items:center;padding:6px}.mark img{width:100%;height:100%;object-fit:contain}.brand strong{display:block;font-family:"Syne",Arial,sans-serif;font-size:18px;line-height:1.05}.brand span{display:block;color:var(--muted);font-size:12px}.nav,.actions,.meta{display:flex;flex-wrap:wrap;gap:8px}.page{width:min(1180px,100%);margin:auto;padding:20px clamp(12px,4vw,28px) 44px}.toolbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}.title h1{margin:0;font-family:"Syne",Arial,sans-serif;font-size:clamp(28px,5vw,42px)}.title p{margin:5px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}.card{background:var(--surface);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}.pad{padding:18px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:38px;padding:9px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface);color:var(--dark);font-family:"Syne",Arial,sans-serif;font-weight:700}.btn.primary{background:var(--dark);border-color:var(--dark);color:var(--bg)}.btn.warn{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.25);color:var(--danger)}.btn.small{min-height:31px;padding:6px 10px;font-size:13px}.btn:disabled{opacity:.45;cursor:not-allowed}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:7px}.field.full{grid-column:1/-1}.field label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}.input,.select,.textarea{width:100%;border:1px solid var(--border);border-radius:14px;background:var(--surface2);padding:12px;color:var(--dark);outline:none}.textarea{min-height:100px;resize:vertical;line-height:1.45}.textarea.tall{min-height:150px}.input:focus,.select:focus,.textarea:focus{border-color:#111;box-shadow:0 0 0 3px rgba(26,26,26,.08)}.list{display:grid;gap:12px}.row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:16px;background:var(--surface)}.row h3{margin:0}.row p{margin:4px 0 0;color:var(--muted);font-size:13px}.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface2);font-size:12px;font-weight:700}.chip.ok{color:var(--ok)}.chip.bad{color:var(--danger)}.empty{text-align:center;padding:34px 18px;color:var(--muted)}.empty h3{margin:0 0 6px;color:var(--dark)}.snapshot{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.snap{border:1px solid var(--border);border-radius:14px;background:var(--surface2);padding:10px}.snap small{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:800}.snap strong{display:block;margin-top:4px}.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px}.photo-card{border:1px solid var(--border);border-radius:16px;background:var(--surface);overflow:hidden}.photo-card img{display:block;width:100%;aspect-ratio:3/4;object-fit:cover;background:#111}.photo-card .body{padding:10px;display:grid;gap:8px}.inline-file,.hidden{position:absolute;left:-9999px;width:1px;height:1px;opacity:0}.report-pages{display:grid;gap:18px;justify-items:center;padding:18px;background:var(--surface2);border-radius:18px;overflow:auto}.paper{position:relative;width:794px;height:1123px;background:#fff;color:#171717;padding:46px 46px 64px;box-shadow:0 8px 26px rgba(0,0,0,.16);overflow:hidden;font-size:12pt;print-color-adjust:exact;-webkit-print-color-adjust:exact}.paper h1{font-size:50px;line-height:1.1;margin:18px 0;font-family:"DM Sans",Arial,sans-serif}.paper h2{font-size:30px;line-height:1.15;margin:0 0 12px}.kicker{font-family:"IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:1.2px;font-size:11px;font-weight:800}.cover{display:flex;flex-direction:column;justify-content:space-between}.cover-grid,.pdf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.cover-box,.summary-box,.pdf-section{border:1px solid #dedbd1;border-radius:14px;background:#fbfaf6;padding:14px}.cover-box small,.summary-box small{display:block;color:#747061;text-transform:uppercase;font-size:10px;font-weight:800}.cover-box strong,.summary-box strong{display:block;margin-top:5px}.pdf-section{margin-top:12px;break-inside:avoid}.pdf-section h3{margin:0 0 8px;font-size:13pt}.pdf-section p,.pdf-section li{white-space:pre-wrap;line-height:1.45}.daily-table{width:100%;border-collapse:collapse;font-size:10.5pt}.daily-table th,.daily-table td{border:1px solid #dedbd1;padding:7px;vertical-align:top}.daily-table th{background:#f7f6f1;text-align:left}.photo-block{display:grid;grid-template-columns:50% 1fr;gap:16px;height:83mm;min-height:83mm;padding:8px 0;border-bottom:1px solid #dedbd1;overflow:hidden}.photo-frame{position:relative;width:100%;height:77mm;border-radius:10px;overflow:hidden;background:#111}.photo-frame img{width:100%;height:100%;object-fit:cover}.watermark{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.72);color:#fff;font-size:9px;padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pdf-footer{position:absolute;left:46px;right:46px;bottom:22px;border-top:1px solid #dedbd1;padding-top:7px;display:flex;justify-content:space-between;gap:10px;color:#8f8b80;font-size:9pt;font-family:"IBM Plex Mono",monospace}.print-tip{margin-bottom:14px;padding:12px;border-radius:14px;background:#fff;border:1px solid var(--border)}
@media(max-width:850px){.top-inner,.toolbar{display:grid}.nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}.grid,.form,.snapshot,.cover-grid,.pdf-grid{grid-template-columns:1fr}.span4,.span5,.span6,.span7,.span8,.span12{grid-column:span 1}.row{grid-template-columns:1fr}.paper{width:100%;height:auto;min-height:0;padding:18px}.paper h1{font-size:32px}.paper h2{font-size:24px}.report-pages{display:block;padding:10px}.photo-block{grid-template-columns:1fr;height:auto}.photo-frame{height:260px}}
@page{size:A4 portrait;margin:0}
@media print{html,body{margin:0!important;background:#fff!important}.top,.no-print{display:none!important}.page,.report-pages{padding:0!important;margin:0!important;width:auto!important;background:#fff!important}.paper{width:210mm!important;height:297mm!important;min-height:297mm!important;margin:0!important;padding:12mm 12mm 18mm!important;box-shadow:none!important;page-break-after:always!important;break-after:page!important}.pdf-footer{left:12mm!important;right:12mm!important;bottom:7mm!important}.photo-frame{height:77mm!important}}
.cover-logo{width:156px;height:156px;object-fit:contain;display:block;margin:0 0 14px;filter:invert(1) contrast(1.08)}
.cover-title{margin-top:10px}
.pdf-attachment-page img{width:100%;max-height:245mm;object-fit:contain;display:block}
.attachment-box{border:1px solid #dedbd1;border-radius:14px;background:#fbfaf6;padding:18px;margin-top:12px}
.danger-zone{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
</style>

<body>
<div id="app"></div>
<script>
const KEY="ics-daily-report-v1";
const APP_VERSION="2026.05.20.project-sync-human-ui";
const HOME_URL=location.pathname.includes("/tools/")?"../../index.html":"./index.html";
const DEFAULT_LOGO_URL=location.pathname.includes("/tools/")?"../../assets/logo.png":"./assets/logo.png";
let db={appVersion:APP_VERSION,projects:[],surveys:[],dailyReports:[],weeklyReports:[]};
let route="daily",activeProjectId="",activeSurveyId="",editingDailyId="",previewDailyId="",previewWeeklyId="",activeDate=today(),autosaveTimer=null,lastSavedText="Belum ada perubahan";
const blobUrlCache=new Map(),pdfRenderJobs=new Set();
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const uid=p=>`${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(v){return v?new Intl.DateTimeFormat("id-ID",{dateStyle:"medium"}).format(new Date(`${v}T00:00:00`)):"-"}
function fmtDateTime(v){return v?new Intl.DateTimeFormat("id-ID",{dateStyle:"short",timeStyle:"short"}).format(new Date(v)):"-"}
function cleanFile(v){return String(v||"Project").replace(/[\\:*?"<>|]/g," ").replace(/\s+/g," ").trim()}
function compactDateTime(v){const d=new Date(v||new Date()),p=n=>String(n).padStart(2,"0");return `${p(d.getDate())}/${p(d.getMonth()+1)}/${String(d.getFullYear()).slice(-2)} ${p(d.getHours())}:${p(d.getMinutes())}`}
function trim(v,n=120){const s=String(v||"");return s.length>n?s.slice(0,n-3).trim()+"...":s}
function startOfWeek(v){const d=new Date(`${v||today()}T00:00:00`);const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.toISOString().slice(0,10)}
function addDays(v,n){const d=new Date(`${v||today()}T00:00:00`);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function normalizeText(v){return String(v||"").trim().toLowerCase().replace(/\s+/g," ")}
function normalizeProjectKey(project){return [project?.name||project?.projectName,project?.location||project?.projectLocation,project?.owner||project?.clientOrOwner||project?.ownerName].map(normalizeText).join("|")}
function findExistingProject(projectCandidate){const key=normalizeProjectKey(projectCandidate);return db.projects.find(p=>normalizeProjectKey(p)===key)||db.projects.find(p=>normalizeText(p.name)===normalizeText(projectCandidate?.name||projectCandidate?.projectName)&&normalizeText(p.location)===normalizeText(projectCandidate?.location||projectCandidate?.projectLocation))||null}
function statusLabel(v){return ({survey_only:"Survey saja",project_registered:"Proyek terdaftar di database",added_to_daily_progress:"Proyek sudah terdaftar",converted_to_daily:"Proyek sudah terdaftar",draft:"Draft",ready:"Siap Export",exported:"Sudah Diexport",needs_review:"Data lama perlu dicek ulang",complete:"Siap Export",final:"Siap Export",revised:"Draft"}[v]||"Draft")}
function normalizeProjectRecord(p){return {...p,id:p.id||p.projectId||uid("project"),name:p.name||p.projectName||"Proyek tanpa nama",location:p.location||p.projectLocation||"",owner:p.owner||p.clientOrOwner||p.ownerName||p.clientName||"",estimator:p.estimator||p.pic||p.estimatorName||"",team:p.team||p.teamName||"Tim ICS",sourceSurveyIds:Array.isArray(p.sourceSurveyIds)?p.sourceSurveyIds:[],status:p.status||"survey_only",updatedAt:p.updatedAt||new Date().toISOString(),createdAt:p.createdAt||new Date().toISOString()}}
function ensureProjectFromSurvey(surveyData){const candidate={name:surveyData.title||surveyData.projectNameSnapshot||"Proyek dari Survey",location:surveyData.location||surveyData.title||"",owner:surveyData.owner||""};let p=findExistingProject(candidate);if(!p){p={id:uid("project"),...candidate,estimator:"",team:"Tim ICS",sourceSurveyIds:[],status:"survey_only",createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};db.projects.push(p)}else{if(!p.location&&candidate.location)p.location=candidate.location;if(!p.owner&&candidate.owner)p.owner=candidate.owner;p.sourceSurveyIds ||= [];p.updatedAt=new Date().toISOString()}if(surveyData.id&&!p.sourceSurveyIds.includes(surveyData.id))p.sourceSurveyIds.push(surveyData.id);return p}
function linkSurveyToProject(surveyId,projectId){const s=getSurveyById(surveyId),p=getProjectById(projectId);if(!s||!p)return false;s.linkedProjectId=p.id;s.status=s.linkedDailyReportId?"added_to_daily_progress":"project_registered";p.sourceSurveyIds ||= [];if(!p.sourceSurveyIds.includes(s.id))p.sourceSurveyIds.push(s.id);p.updatedAt=new Date().toISOString();return true}
function activateProjectForDailyProgress(projectId,surveyId=null){const p=getProjectById(projectId);if(!p)return false;p.status="active_daily_progress";p.updatedAt=new Date().toISOString();if(surveyId){const s=getSurveyById(surveyId);if(s)s.status="added_to_daily_progress"}return true}
function migrateDuplicateWeeklyProjects(){db.projects=(db.projects||[]).map(normalizeProjectRecord);const canonicalByKey=new Map(),idMap=new Map(),merged=[];for(const project of db.projects){const key=normalizeProjectKey(project);const canonical=canonicalByKey.get(key);if(canonical){idMap.set(project.id,canonical.id);canonical.sourceSurveyIds=[...new Set([...(canonical.sourceSurveyIds||[]),...(project.sourceSurveyIds||[])])];if(!canonical.location&&project.location)canonical.location=project.location;if(!canonical.owner&&project.owner)canonical.owner=project.owner;canonical.updatedAt=new Date().toISOString()}else{canonicalByKey.set(key,project);merged.push(project)}}if(idMap.size){db.dailyReports.forEach(r=>{if(idMap.has(r.projectId))r.projectId=idMap.get(r.projectId)});db.weeklyReports.forEach(w=>{if(idMap.has(w.projectId))w.projectId=idMap.get(w.projectId)});db.surveys.forEach(s=>{if(idMap.has(s.linkedProjectId))s.linkedProjectId=idMap.get(s.linkedProjectId)})}db.projects=merged}
function normalizeIdList(list){const seen=new Set();return (list||[]).filter(x=>x&&x.id&&!seen.has(x.id)&&seen.add(x.id))}
function normalizeDaily(r){return{...r,projectId:r.projectId||"",date:r.date||today(),sourceSurveyId:r.sourceSurveyId||r.sourceSurveyReportId||null,progress:r.progress??r.progressText??"",notes:r.notes??"",kendala:r.kendala??r.issues??"",followUp:r.followUp??"",documentationMeta:r.documentationMeta||{weather:r.weather||"",workHours:r.workHours||"",area:r.area||""},photos:(r.photos||[]).map((p,i)=>({id:p.id||uid("photo"),number:p.number||i+1,url:p.url||p.fileUrl||"",caption:p.caption||p.description||"",takenAt:p.takenAt||new Date().toISOString(),includeWeekly:p.includeWeekly!==false}))}}
function normalizeWeekly(w){return{...w,projectId:w.projectId||"",periodStart:w.periodStart||w.startDate||today(),periodEnd:w.periodEnd||w.endDate||today(),weekLabel:w.weekLabel||`Weekly ${fmtDate(w.startDate||w.periodStart)} - ${fmtDate(w.endDate||w.periodEnd)}`,sourceDailyReportIds:w.sourceDailyReportIds||w.includedDailyReportIds||[],autoSummary:w.autoSummary||w.generatedSummary?.autoSummary||"",manualNotes:w.manualNotes||"",progressAttachment:w.progressAttachment||null,generatedAt:w.generatedAt||w.createdAt||new Date().toISOString(),updatedAt:w.updatedAt||w.createdAt||new Date().toISOString()}}
function load(){try{const raw=localStorage.getItem(KEY);if(raw)db=JSON.parse(raw)}catch(e){console.warn("Load gagal",e)}db.projects=normalizeIdList(db.projects||[]).map(normalizeProjectRecord);db.surveys=normalizeIdList(db.surveys||[]);db.dailyReports=normalizeIdList((db.dailyReports||[]).map(normalizeDaily));db.weeklyReports=normalizeIdList((db.weeklyReports||[]).map(normalizeWeekly));db.appVersion=APP_VERSION;migrateDuplicateWeeklyProjects();db.weeklyReports=db.weeklyReports.filter(w=>getProjectById(w.projectId));db.dailyReports=db.dailyReports.filter(r=>getProjectById(r.projectId));if(!activeProjectId||!getProjectById(activeProjectId))activeProjectId=db.projects[0]?.id||"";save(false)}
function save(updateStatus=true){db.appVersion=APP_VERSION;localStorage.setItem(KEY,JSON.stringify(db));if(updateStatus){lastSavedText=`Tersimpan ${new Date().toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}`;renderHeaderStatus()}}
function getProjectById(projectId){return db.projects.find(p=>p.id===projectId)||null}
function getSurveyById(surveyId){return db.surveys.find(s=>s.id===surveyId)||null}
function getDailyById(id){return db.dailyReports.find(r=>r.id===id)||null}
function getWeeklyById(id){return db.weeklyReports.find(w=>w.id===id)||null}
function getDailyReportsByProjectAndPeriod(projectId,startDate,endDate){if(!getProjectById(projectId))return[];return db.dailyReports.filter(r=>r.projectId===projectId&&(!startDate||r.date>=startDate)&&(!endDate||r.date<=endDate)).sort((a,b)=>String(a.date).localeCompare(String(b.date)))}
function weeklyReportsForProject(projectId){return db.weeklyReports.filter(w=>w.projectId===projectId).sort((a,b)=>String(b.generatedAt).localeCompare(String(a.generatedAt)))}
function photosOf(r){return Array.isArray(r?.photos)?r.photos:[]}
function projectSelectorHTML(value=activeProjectId,required=true){return `<select class="select" name="projectId" ${required?"required":""} onchange="activeProjectId=this.value;render()"><option value="">Pilih proyek</option>${db.projects.map(p=>`<option value="${p.id}" ${p.id===value?"selected":""}>${esc(p.name)}</option>`).join("")}</select>`}
function surveyDisplayName(id){const s=getSurveyById(id);return s?`${s.title||"Survey"} - ${fmtDate(s.surveyDate)}`:"-"}
function dailyDisplayName(r){return r?`${fmtDate(r.date)} - ${getProjectById(r.projectId)?.name||"Project"}`:"Daily Report"}
function render(){const views={survey:viewSurvey,daily:viewDaily,weekly:viewWeekly,projects:viewProjects,dailyPreview:viewDailyPreview,weeklyPreview:viewWeeklyPreview};$("#app").innerHTML=shell((views[route]||viewDaily)());$$("[data-go]").forEach(b=>b.onclick=()=>{route=b.dataset.go;editingDailyId="";render()});bindForms();renderHeaderStatus()}
function renderHeaderStatus(){const n=$("#saveStatus");if(n)n.textContent=lastSavedText}
function shell(content){const p=getProjectById(activeProjectId);return `<header class="top no-print"><div class="top-inner"><div class="brand"><div class="mark"><img src="${DEFAULT_LOGO_URL}" alt="ICS"></div><div><strong>IC Solution Daily Report</strong><span>${esc(p?.name||"Belum pilih proyek")} - ${fmtDate(activeDate)} - <span id="saveStatus">${esc(lastSavedText)}</span></span></div></div><nav class="nav"><a class="btn small" href="${HOME_URL}">Home</a><button class="btn small" data-go="survey">Survey</button><button class="btn small" data-go="daily">Daily</button><button class="btn small" data-go="weekly">Weekly</button><button class="btn small" data-go="projects">Proyek</button><button class="btn small" onclick="backupJSON()">Backup</button><label class="btn small">Restore<input class="inline-file" type="file" id="restoreInput" accept="application/json"></label></nav></div></header><main class="page">${content}</main>`}
function projectSummary(p){return `<div class="snapshot"><div class="snap"><small>Lokasi</small><strong>${esc(p.location||"-")}</strong></div><div class="snap"><small>Owner</small><strong>${esc(p.owner||"-")}</strong></div><div class="snap"><small>Estimator</small><strong>${esc(p.estimator||p.pic||"-")}</strong></div><div class="snap"><small>Tim</small><strong>${esc(p.team||"-")}</strong></div></div>`}
function viewProjects(){const p=getProjectById(activeProjectId)||{};return `<section><div class="toolbar"><div class="title"><h1>Data Proyek</h1><p>Satu data proyek dipakai bersama oleh Survey, Daily Progress, dan Weekly Progress.</p></div><button class="btn" data-go="daily">Kembali</button></div><div class="grid"><div class="card pad span5"><form class="form" id="projectForm"><input type="hidden" name="id" value="${esc(p.id||"")}"><div class="field full"><label>Nama proyek</label><input class="input" name="name" required value="${esc(p.name||"")}"></div><div class="field full"><label>Lokasi</label><input class="input" name="location" value="${esc(p.location||"")}"></div><div class="field"><label>Owner</label><input class="input" name="owner" value="${esc(p.owner||"")}"></div><div class="field"><label>Estimator</label><input class="input" name="estimator" value="${esc(p.estimator||p.pic||"")}"></div><div class="field full"><label>Tim</label><input class="input" name="team" value="${esc(p.team||"Tim ICS")}"></div><div class="field full"><button class="btn primary" type="submit">Simpan Proyek</button></div></form>${p.id?`<div class="danger-zone"><button class="btn warn" onclick="deleteProject('${p.id}')">Hapus Data Proyek</button><p class="muted">Menghapus proyek juga menghapus laporan Survey, Daily Progress, dan Weekly Progress yang terkait.</p></div>`:""}</div><div class="card pad span7"><h2 style="margin-top:0">Proyek Tersimpan</h2><div class="list">${db.projects.map(p=>`<article class="row"><div><h3>${esc(p.name)}</h3><p>${esc(p.location||"-")} - ${esc(p.owner||"-")}</p><div class="meta"><span class="chip">${getDailyReportsByProjectAndPeriod(p.id).length} Daily Progress</span><span class="chip">${weeklyReportsForProject(p.id).length} Weekly Progress</span></div></div><div class="actions"><button class="btn small primary" onclick="activeProjectId='${p.id}';route='daily';render()">Daily</button><button class="btn small" onclick="activeProjectId='${p.id}';route='weekly';render()">Weekly</button><button class="btn small" onclick="activeProjectId='${p.id}';route='projects';render()">Edit</button><button class="btn small warn" onclick="deleteProject('${p.id}')">Hapus</button></div></article>`).join("")||`<div class="empty"><h3>Belum ada proyek</h3><p>Tambahkan proyek eksplisit sebelum membuat Daily atau Weekly.</p></div>`}</div></div></div></section>`}
function saveProject(fd){const explicitId=fd.get("id");const data={id:explicitId||uid("project"),name:String(fd.get("name")||"").trim(),location:fd.get("location")||"",owner:fd.get("owner")||"",estimator:fd.get("estimator")||"",team:fd.get("team")||"Tim ICS",updatedAt:new Date().toISOString()};if(!data.name){alert("Nama proyek wajib diisi.");return null}const existing=explicitId?getProjectById(explicitId):findExistingProject(data);if(existing){Object.assign(existing,{...data,id:existing.id,createdAt:existing.createdAt||new Date().toISOString()});activeProjectId=existing.id}else{db.projects.push({...data,createdAt:new Date().toISOString()});activeProjectId=data.id}save();route="projects";render();return activeProjectId}

function renderWeeklyReportsForProject(projectId){const p=getProjectById(projectId),items=p?weeklyReportsForProject(projectId):[];return `<h2 style="margin-top:0">Weekly Reports ${p?`- ${esc(p.name)}`:""}</h2><div class="list">${items.map(w=>{const s=w.summaryData||{};return `<article class="row"><div><h3>${esc(w.weekLabel)}</h3><p>${fmtDate(w.periodStart)} - ${fmtDate(w.periodEnd)}<br>${(w.sourceDailyReportIds||[]).length} Daily Progress, ${(s.photos||[]).length} foto</p><div class="meta"><span class="chip">${esc(statusLabel(w.status||"draft"))}</span></div></div><div class="actions"><button class="btn small primary" onclick="previewWeeklyId='${w.id}';route='weeklyPreview';render()">Buka</button><button class="btn small warn" onclick="deleteWeekly('${w.id}')">Hapus</button></div></article>`}).join("")||`<div class="empty"><h3>Belum ada Weekly Report</h3><p>Generate dari Daily Report periode custom.</p></div>`}</div>`}
function viewWeeklyPreview(){const w=getWeeklyById(previewWeeklyId);if(!w)return `<div class="empty"><h3>Weekly Report tidak ditemukan</h3></div>`;setTimeout(()=>ensureWeeklyPdfRendered(w.id),0);return `<section><div class="toolbar no-print"><div class="title"><h1>Weekly Report Preview</h1><p>Weekly tersimpan sebagai laporan mingguan untuk proyek terdaftar.</p></div><div class="actions"><button class="btn" data-go="weekly">Kembali</button><button class="btn primary" onclick="generateWeeklyPdf('${w.id}')">Export / Simpan PDF</button></div></div><div class="report-pages">${weeklyPdfPages(w)}</div></section>`}
function weeklyPdfPages(w){const p=getProjectById(w.projectId),s=w.summaryData||generateWeeklySummaryFromDailyReports((w.sourceDailyReportIds||[]).map(getDailyById).filter(Boolean)),photos=s.photos||[],groups=[];for(let i=0;i<Math.max(photos.length,1);i+=3){const g=photos.slice(i,i+3);while(g.length<3)g.push(null);groups.push(g)}const cover=reportCoverPage("Laporan Mingguan","Laporan Mingguan Progress Proyek",p,[{label:"Minggu",value:w.weekLabel},{label:"Periode",value:`${fmtDate(w.periodStart)} - ${fmtDate(w.periodEnd)}`},{label:"Lokasi",value:p?.location||"-"},{label:"Owner/client",value:p?.owner||"-"},{label:"Estimator",value:p?.estimator||"-"},{label:"Dibuat oleh",value:p?.team||"Tim ICS"},{label:"Tanggal dibuat",value:fmtDate((w.generatedAt||"").slice(0,10)||today())}],w.periodEnd);return `${cover}${weeklySummaryPages(w,s,p)}${attachmentReportPages(w)}${dailyTablePage(w,s)}${groups.map((g,i)=>`<section class="paper"><div class="kicker">Dokumentasi Foto</div><h2>Foto Weekly - Halaman ${i+1}</h2>${g.map(ph=>photoBlock(ph,ph?.sourceDate,ph?.sourceArea)).join("")}${footerHtml(p?.name,w.periodEnd)}</section>`).join("")}`}
function splitText(v,max=760){const s=String(v||"-").trim()||"-";if(s.length<=max)return[s];const parts=[];let rest=s;while(rest.length>max){let cut=rest.lastIndexOf("\n",max);if(cut<max*.45)cut=rest.lastIndexOf(". ",max);if(cut<max*.45)cut=rest.lastIndexOf(" ",max);if(cut<max*.45)cut=max;parts.push(rest.slice(0,cut).trim());rest=rest.slice(cut).trim()}if(rest)parts.push(rest);return parts}
function weeklySummaryPages(w,s,p){const cards=[{title:"Progress Mingguan",html:`${summaryList("Progress Summary",s.progressItems)}${summaryList("Notes",s.notesItems)}`},{title:"Summary Mingguan",text:w.autoSummary||s.autoSummary},{title:"Notes / Logs / Kendala",html:summaryList("Kendala Summary",s.kendalaItems)},{title:"Follow-up / Tindak Lanjut",html:summaryList("Follow-up Summary",s.followUpItems)}].flatMap(card=>card.html?[card]:splitText(card.text,760).map((text,i)=>({title:i?`${card.title} - Lanjutan`:card.title,text})));const pages=[];while(cards.length){const chunk=cards.splice(0,2);pages.push(`<section class="paper"><h2>${pages.length?"Ringkasan Mingguan - Lanjutan":"Ringkasan Mingguan"}</h2><p>${fmtDate(w.periodStart)} - ${fmtDate(w.periodEnd)}</p>${chunk.map(c=>c.html?`<div class="pdf-section"><h3>${esc(c.title)}</h3>${c.html}</div>`:section(c.title,c.text)).join("")}${footerHtml(p?.name,w.periodEnd)}</section>`)}return pages.join("")}
function dailyTablePage(w,s){const ds=s.dailySnapshots||[];return `<section class="paper"><h2>Daily Reports Source</h2><table class="daily-table"><thead><tr><th>Daily Report</th><th>Progress</th><th>Kendala</th><th>Follow-up</th></tr></thead><tbody>${ds.map(r=>`<tr><td>${esc(dailyDisplayName(r))}</td><td>${esc(r.progress||"-")}</td><td>${esc(r.kendala||"-")}</td><td>${esc(r.followUp||"-")}</td></tr>`).join("")}</tbody></table>${footerHtml(getProjectById(w.projectId)?.name,w.periodEnd)}</section>`}
function section(title,text){return `<div class="pdf-section"><h3>${esc(title)}</h3><p>${esc(text||"-")}</p></div>`}
function summaryList(title,items=[]){if(!items.length)return section(title,"-");return `<div class="pdf-section"><h3>${esc(title)}</h3><ul>${items.map(x=>`<li><b>${fmtDate(x.date)}:</b> ${esc(x.text)}</li>`).join("")}</ul></div>`}
function photoBlock(ph,date,area){if(!ph)return `<article class="photo-block" style="visibility:hidden"><div></div><div></div></article>`;return `<article class="photo-block"><div class="photo-frame"><img src="${ph.url}"><div class="watermark">${compactDateTime(ph.takenAt)} | ${fmtDate(date)}</div></div><div><h3>Foto No. ${String(ph.number||1).padStart(2,"0")}</h3><p><b>Tanggal:</b> ${fmtDate(date)}</p><p><b>Area:</b> ${esc(area||"-")}</p><p><b>Caption:</b><br>${esc(ph.caption||"-")}</p></div></article>`}
function attachmentReportPages(w){const a=w.progressAttachment,p=getProjectById(w.projectId);if(!a)return"";if(a.renderedPages?.length)return a.renderedPages.map((src,i)=>`<section class="paper pdf-attachment-page"><div class="kicker">Lampiran Progress</div><h2>Dokumen Progress${a.renderedPages.length>1?` - Halaman ${i+1}`:""}</h2><p class="muted">${esc(a.name)}</p><img src="${src}" alt="Lampiran progress halaman ${i+1}">${footerHtml(p?.name,w.periodEnd)}</section>`).join("");return `<section class="paper"><div class="kicker">Lampiran Progress</div><h2>Dokumen Progress</h2><p>${esc(a.name)}</p>${attachmentPreview(a)}${footerHtml(p?.name,w.periodEnd)}</section>`}
function attachmentPreview(a){if(a.renderStatus==="rendering")return `<div class="attachment-box"><strong>Menyiapkan lampiran PDF...</strong><p>PDF sedang dirender menjadi gambar agar ikut tampil di export.</p></div>`;if(a.renderStatus==="failed")return `<div class="attachment-box"><strong>PDF gagal dirender</strong><p>${esc(a.renderError||"Coba buka ulang preview saat internet aktif.")}</p></div>`;return `<div class="attachment-box"><strong>Menyiapkan lampiran PDF...</strong><p>Jika belum tampil, tunggu sebentar atau buka ulang preview.</p></div>`}
function dataUrlToBytes(dataUrl){const raw=atob(String(dataUrl||"").split(",")[1]||""),bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);return bytes}
function loadPdfJs(){if(window.pdfjsLib)return Promise.resolve(window.pdfjsLib);return new Promise((res,rej)=>{const existing=document.querySelector('script[data-pdfjs]');if(existing){existing.addEventListener("load",()=>res(window.pdfjsLib),{once:true});existing.addEventListener("error",rej,{once:true});return}const s=document.createElement("script");s.dataset.pdfjs="1";s.src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js";s.onload=()=>window.pdfjsLib?res(window.pdfjsLib):rej(new Error("PDF.js tidak tersedia"));s.onerror=()=>{s.remove();rej(new Error("Gagal memuat PDF.js."))};document.head.appendChild(s)})}
async function renderPdfDataUrlToImages(dataUrl){const pdfjs=await loadPdfJs();const doc=await pdfjs.getDocument({data:dataUrlToBytes(dataUrl),disableWorker:true}).promise;const pages=[];for(let i=1;i<=doc.numPages;i++){const page=await doc.getPage(i),base=page.getViewport({scale:1}),scale=Math.min(3,1800/base.width),viewport=page.getViewport({scale});const canvas=document.createElement("canvas");canvas.width=Math.ceil(viewport.width);canvas.height=Math.ceil(viewport.height);const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);await page.render({canvasContext:ctx,viewport}).promise;pages.push(canvas.toDataURL("image/jpeg",.9))}return pages}
async function ensureWeeklyPdfRendered(id){const w=getWeeklyById(id),a=w?.progressAttachment;if(!a||!String(a.type||"").includes("pdf")||a.renderedPages?.length||pdfRenderJobs.has(id))return;pdfRenderJobs.add(id);a.renderStatus="rendering";a.renderError="";save(false);try{a.renderedPages=await renderPdfDataUrlToImages(a.url);a.renderStatus="done";save(false)}catch(e){console.warn(e);a.renderStatus="failed";a.renderError=e.message||"PDF gagal dirender";save(false)}finally{pdfRenderJobs.delete(id);if(route==="weeklyPreview"&&previewWeeklyId===id)render()}}
function footerHtml(projectName,date){return `<footer class="pdf-footer"><span>IC Solution</span><span>${esc(projectName||"Report")}</span><span>${fmtDate(date)}</span></footer>`}
function exportDailyPDF(id){const r=getDailyById(id),old=document.title;document.title=`Daily - ${cleanFile(getProjectById(r?.projectId)?.name)} - ${r?.date||today()}`;window.onafterprint=()=>{document.title=old;window.onafterprint=null};setTimeout(()=>{window.print();setTimeout(()=>{document.title=old},30000)},120)}
function generateWeeklyPdf(weeklyReportId){const w=getWeeklyById(weeklyReportId);if(w?.progressAttachment&&String(w.progressAttachment.type||"").includes("pdf")&&!w.progressAttachment.renderedPages?.length){ensureWeeklyPdfRendered(weeklyReportId);alert("Lampiran PDF progress sedang dirender menjadi gambar. Tunggu sampai halaman lampiran tampil, lalu export lagi.");return}const old=document.title;document.title=`Weekly - ${cleanFile(getProjectById(w?.projectId)?.name)} - ${w?.periodStart||today()} - ${w?.periodEnd||today()}`;window.onafterprint=()=>{document.title=old;window.onafterprint=null};setTimeout(()=>{window.print();setTimeout(()=>{document.title=old},30000)},120)}
function deleteWeekly(id){if(!confirm("Hapus Weekly Report ini?"))return;db.weeklyReports=db.weeklyReports.filter(w=>w.id!==id);save();render()}
function bindForms(){const projectForm=$("#projectForm");if(projectForm)projectForm.onsubmit=e=>{e.preventDefault();saveProject(new FormData(projectForm))};const surveyForm=$("#surveyForm");if(surveyForm)surveyForm.onsubmit=e=>{e.preventDefault();saveSurvey(new FormData(surveyForm)).catch(err=>alert(`Survey gagal disimpan: ${err.message}`))};const convertForm=$("#convertSurveyForm");if(convertForm)convertForm.onsubmit=e=>{e.preventDefault();const fd=new FormData(convertForm);convertSurveyToDailyReport(fd.get("surveyId"),fd.get("projectId"))};const dailyForm=$("#dailyForm");if(dailyForm){dailyForm.oninput=()=>{lastSavedText="Ada perubahan belum disimpan";renderHeaderStatus();clearTimeout(autosaveTimer);autosaveTimer=setTimeout(()=>saveDailyReport(new FormData(dailyForm)).catch(console.warn),1400)};dailyForm.onsubmit=e=>{e.preventDefault();saveDailyReport(new FormData(dailyForm)).catch(err=>alert(`Daily gagal disimpan: ${err.message}`))}}const weeklyForm=$("#weeklyForm");if(weeklyForm)weeklyForm.onsubmit=e=>{e.preventDefault();const fd=new FormData(weeklyForm),projectId=fd.get("projectId"),periodStart=fd.get("periodStart"),periodEnd=fd.get("periodEnd"),dailies=getDailyReportsByProjectAndPeriod(projectId,periodStart,periodEnd),progressPdf=fd.get("progressPdf");if(!dailies.length){alert("Tidak ada Daily Report untuk proyek dan periode ini.");return}saveWeeklyReport(projectId,periodStart,periodEnd,generateWeeklySummaryFromDailyReports(dailies),progressPdf).catch(err=>alert(`Weekly gagal disimpan: ${err.message}`))};const restore=$("#restoreInput");if(restore)restore.onchange=e=>restoreJSON(e.target.files?.[0])}
function backupJSON(){const payload={appVersion:APP_VERSION,projects:db.projects,surveys:db.surveys,dailyReports:db.dailyReports,weeklyReports:db.weeklyReports,exportedAt:new Date().toISOString()};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`ics-report-backup-${today()}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function restoreJSON(file){if(!file)return;try{const incoming=JSON.parse(await file.text());if(!confirm("Restore akan mengganti semua data lokal report di browser ini. Lanjut?"))return;db={appVersion:incoming.appVersion||APP_VERSION,projects:incoming.projects||[],surveys:incoming.surveys||[],dailyReports:incoming.dailyReports||[],weeklyReports:incoming.weeklyReports||[]};activeProjectId=db.projects[0]?.id||"";activeSurveyId="";editingDailyId="";previewDailyId="";previewWeeklyId="";load();route="daily";render()}catch(e){alert(`Restore gagal: ${e.message}`)}}
function imageToData(file,max=1200,q=.78){return new Promise((res,rej)=>{const r=new FileReader();r.onerror=rej;r.onload=()=>{const im=new Image();im.onerror=rej;im.onload=()=>{const s=Math.min(1,max/Math.max(im.naturalWidth,im.naturalHeight));const c=document.createElement("canvas");c.width=Math.max(1,Math.round(im.naturalWidth*s));c.height=Math.max(1,Math.round(im.naturalHeight*s));c.getContext("2d").drawImage(im,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",q))};im.src=r.result};r.readAsDataURL(file)})}
function fileToData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onerror=rej;r.onload=()=>res(String(r.result||""));r.readAsDataURL(file)})}
window.addEventListener("error",e=>console.warn("App error",e.message));
load();render();
</script>
