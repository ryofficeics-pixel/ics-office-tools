<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator Pembesian ICS v3.2</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    select{-webkit-appearance:none;}
    input[type=number]::-webkit-inner-spin-button{opacity:.4;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px;}
    body{background:#f0efe9;color:#1a1a1a;font-size:13px;font-family:system-ui,-apple-system,sans-serif;}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

const BAR_DIA=[8,10,12,13,16,19,22,25,32];
const BAR_WT={8:0.395,10:0.617,12:0.888,13:1.042,16:1.578,19:2.226,22:2.984,25:3.853,32:6.313};
const WM_TYPES=["M4","M5","M6","M7","M8","M10"];
const WM_WT={M4:1.32,M5:2.06,M6:2.96,M7:4.03,M8:5.27,M10:8.23};
const JENIS=["Ulir","Polos"];
const META={
  A:{label:"Sloof",  color:"#4a4a6a",bg:"rgba(74,74,106,0.1)",  bd:"rgba(74,74,106,0.3)"},
  B:{label:"Balok",  color:"#2d7a4a",bg:"rgba(45,122,74,0.1)",  bd:"rgba(45,122,74,0.3)"},
  C:{label:"Kolom",  color:"#8a7a5a",bg:"rgba(138,122,90,0.1)", bd:"rgba(138,122,90,0.3)"},
  D:{label:"Plat",   color:"#2d7a9a",bg:"rgba(45,122,154,0.1)", bd:"rgba(45,122,154,0.3)"},
};

const mkGrp=(id,label,dia,jenis,jml)=>({id,label,dia,jenis,jml});
const mkSloof=id=>({id,panjang:6,lebar:0.3,tinggi:0.5,qty:1,
  tulanganGroups:[mkGrp(Date.now(),"Tulangan Utama",16,"Ulir",4)],
  sengkang:{dia:10,jenis:"Ulir",jarak:0.15}});
const mkBalok=id=>({id,panjang:6,lebar:0.3,tinggi:0.5,qty:1,
  tulanganGroups:[mkGrp(Date.now(),"Tulangan Utama",16,"Ulir",4)],
  sengkang:{dia:10,jenis:"Ulir",jarak:0.15}});
const mkKolom=id=>({id,lebar:0.4,dalam:0.4,tinggi:3.5,qty:1,
  tulanganGroups:[mkGrp(Date.now(),"Tulangan Utama",16,"Ulir",8)],
  sengkang:{dia:10,jenis:"Ulir",jarak:0.15}});
const mkPlat=id=>({id,panjang:4,lebar:4,tebal:0.12,qty:1,mode:"batang",
  atas:{dia:12,jenis:"Ulir",jarakX:0.15,jarakY:0.15},
  bawah:{dia:12,jenis:"Ulir",jarakX:0.15,jarakY:0.15},
  wm:{tipe:"M6",lapis:1,overlapX:0.1,overlapY:0.1}});

function upd(setter,id,path,val){
  setter(prev=>prev.map(it=>{
    if(it.id!==id)return it;
    const k=path.split(".");
    if(k.length===1)return{...it,[k[0]]:val};
    if(k.length===2)return{...it,[k[0]]:{...it[k[0]],[k[1]]:val}};
    if(k.length===3)return{...it,[k[0]]:{...it[k[0]],[k[1]]:{...it[k[0]][k[1]],[k[2]]:val}}};
    return it;
  }));
}
function remI(setter,id){setter(p=>p.filter(x=>x.id!==id));}

function updGrp(setter,itemId,gid,field,val){
  setter(prev=>prev.map(it=>{
    if(it.id!==itemId)return it;
    return{...it,tulanganGroups:it.tulanganGroups.map(g=>g.id===gid?{...g,[field]:val}:g)};
  }));
}
function addGrp(setter,itemId){
  setter(prev=>prev.map(it=>{
    if(it.id!==itemId)return it;
    const n=it.tulanganGroups.length+1;
    return{...it,tulanganGroups:[...it.tulanganGroups,mkGrp(Date.now(),`Tulangan Tambahan ${n}`,16,"Ulir",2)]};
  }));
}
function remGrp(setter,itemId,gid){
  setter(prev=>prev.map(it=>{
    if(it.id!==itemId||it.tulanganGroups.length<=1)return it;
    return{...it,tulanganGroups:it.tulanganGroups.filter(g=>g.id!==gid)};
  }));
}

function calcLinGroups(it,L,q){
  return(it.tulanganGroups||[]).map(g=>{
    const lap=40*(+g.dia/1000)*2; // lap splice kedua ujung
    const bLen=L+lap,bQty=+g.jml*q,wt=BAR_WT[+g.dia]||0;
    return{lb:g.label||"Tulangan",gid:g.id,dia:+g.dia,jenis:g.jenis,n:bQty,ln:bLen,tot:bLen*bQty,wt,totWt:bLen*bQty*wt};
  });
}
function calcLin(it){
  const l=+it.panjang||0,w=+it.lebar||0,h=+it.tinggi||0,q=+it.qty||0;
  const vol=l*w*h*q,form=(2*h+w)*l*q; // 3 sisi (bawah menyatu pelat/tanah)
  const sp=Math.max(+it.sengkang.jarak||0.15,0.05);
  const stN=l>0?(Math.ceil(l/sp)+1)*q:0; // guard: elemen panjang=0 tidak punya sengkang
  const stL=2*Math.max(w-0.08,0.05)+2*Math.max(h-0.08,0.05)+0.1;
  const sWt=BAR_WT[+it.sengkang.dia]||0;
  const groups=calcLinGroups(it,l,q);
  return{vol,form,groups,stN,stL,stTot:stN*stL,sWt};
}
function calcKol(it){
  const w=+it.lebar||0,d=+it.dalam||0,h=+it.tinggi||0,q=+it.qty||0;
  const vol=w*d*h*q,form=2*(w+d)*h*q; // 4 sisi keliling × tinggi
  const sp=Math.max(+it.sengkang.jarak||0.15,0.05);
  const stN=h>0?(Math.ceil(h/sp)+1)*q:0; // guard: kolom tinggi=0 tidak punya sengkang
  const stL=2*Math.max(w-0.08,0.05)+2*Math.max(d-0.08,0.05)+0.1;
  const sWt=BAR_WT[+it.sengkang.dia]||0;
  const groups=calcLinGroups(it,h,q);
  return{vol,form,groups,stN,stL,stTot:stN*stL,sWt};
}
function calcPlat(it){
  const l=+it.panjang||0,w=+it.lebar||0,t=+it.tebal||0.12,q=+it.qty||0;
  const vol=l*w*t*q,form=l*w*q;
  if(it.mode==="wiremesh"){
    const eL=Math.max(5.4-(+it.wm.overlapX||0.1), 0.5);  // guard: overlap tidak boleh >= lebar sheet
    const eW=Math.max(2.1-(+it.wm.overlapY||0.1), 0.3);  // guard: overlap tidak boleh >= panjang sheet
    const sh=Math.ceil(l/eL)*Math.ceil(w/eW)*(+it.wm.lapis||1)*q;
    return{vol,form,mode:"wm",sheets:sh,wmWt:(WM_WT[it.wm.tipe]||2.96)*l*w*(+it.wm.lapis||1)*q};
  }
  const dirs=[
    {lb:"T.Atas X", dia:+it.atas.dia,jenis:it.atas.jenis, sp:+it.atas.jarakX,L:l,W:w},
    {lb:"T.Atas Y", dia:+it.atas.dia,jenis:it.atas.jenis, sp:+it.atas.jarakY,L:w,W:l},
    {lb:"T.Bawah X",dia:+it.bawah.dia,jenis:it.bawah.jenis,sp:+it.bawah.jarakX,L:l,W:w},
    {lb:"T.Bawah Y",dia:+it.bawah.dia,jenis:it.bawah.jenis,sp:+it.bawah.jarakY,L:w,W:l},
  ];
  const rows=dirs.map(d=>{
    const sp=Math.max(d.sp||0.15,0.05); // guard: jarak minimum 5cm
    const n=d.L>0?(Math.ceil(d.L/sp)+1)*q:0; // guard: dimensi=0 tidak punya tulangan
    const ln=d.W+0.3,tot=n*ln,wt=BAR_WT[d.dia]||0;
    return{lb:d.lb,dia:d.dia,jenis:d.jenis,n,ln,tot,wt,totWt:tot*wt};
  });
  return{vol,form,mode:"bar",rows};
}

const CX=Math.cos(Math.PI/6),SX=0.5;
function toS(x,y,z,sc,ox,oy){return[(x-z)*CX*sc+ox,(x+z)*SX*sc-y*sc+oy];}
function hexRGB(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function isoFace(ctx,verts,sc,ox,oy,fill,stroke){
  const p=verts.map(v=>toS(v[0],v[1],v[2],sc,ox,oy));
  ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);p.slice(1).forEach(q=>ctx.lineTo(q[0],q[1]));ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=0.5;ctx.stroke();}
}
function isoBox(ctx,x,y,z,W,H,D,sc,ox,oy,hex,alpha){
  const[r,g,b]=hexRGB(hex),e="rgba(0,0,0,0.18)";
  const f=(k,a)=>`rgba(${Math.round(r*k)},${Math.round(g*k)},${Math.round(b*k)},${a})`;
  isoFace(ctx,[[x,y,z],[x,y,z+D],[x,y+H,z+D],[x,y+H,z]],sc,ox,oy,f(0.7,alpha*0.7),e);
  isoFace(ctx,[[x,y,z],[x+W,y,z],[x+W,y+H,z],[x,y+H,z]],sc,ox,oy,f(0.85,alpha*0.85),e);
  isoFace(ctx,[[x,y+H,z],[x+W,y+H,z],[x+W,y+H,z+D],[x,y+H,z+D]],sc,ox,oy,f(1,alpha),e);
}
function isoLine(ctx,x1,y1,z1,x2,y2,z2,sc,ox,oy,color,lw){
  const[ax,ay]=toS(x1,y1,z1,sc,ox,oy),[bx,by]=toS(x2,y2,z2,sc,ox,oy);
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.strokeStyle=color;ctx.lineWidth=lw||1;ctx.stroke();
}
function isoText(ctx,x,y,z,text,color,size,sc,ox,oy){
  if(sc===undefined||ox===undefined||oy===undefined)return;
  const[sx,sy]=toS(x,y,z,sc,ox,oy);
  ctx.save();ctx.fillStyle=color||"#333";ctx.font=`bold ${size||11}px sans-serif`;
  ctx.shadowColor="rgba(255,255,255,0.9)";ctx.shadowBlur=3;ctx.fillText(text,sx+4,sy-2);ctx.restore();
}
function drawKolomIso(ctx,cx,cz,W,D,H,nBar,stSp,sc,ox,oy){
  isoBox(ctx,cx,0,cz,W,H,D,sc,ox,oy,"#c4b89a",0.38);
  const cv=0.045,corners=[[cv,cv],[W-cv,cv],[W-cv,D-cv],[cv,D-cv]];
  for(let i=0;i<Math.min(nBar,8);i++)
    isoLine(ctx,cx+corners[i%4][0],0,cz+corners[i%4][1],cx+corners[i%4][0],H,cz+corners[i%4][1],sc,ox,oy,"#b07020",1.8);
  const step=Math.max(stSp*2,0.2);
  for(let yi=stSp;yi<H;yi+=step){const sq=[...corners,corners[0]];for(let i=0;i<4;i++)isoLine(ctx,cx+sq[i][0],yi,cz+sq[i][1],cx+sq[i+1][0],yi,cz+sq[i+1][1],sc,ox,oy,"#d49030",0.85);}
}
function drawBeamXIso(ctx,px,py,pz,L,H,BW,nBar,stSp,sc,ox,oy,hexC,hexB,hexS){
  isoBox(ctx,px,py,pz,L,H,BW,sc,ox,oy,hexC,0.38);
  const cv=0.04,barPos=[[cv,cv],[cv,H-cv],[BW-cv,cv],[BW-cv,H-cv]].slice(0,Math.min(nBar,4));
  barPos.forEach(([bz,by])=>isoLine(ctx,px+cv,py+by,pz+bz,px+L-cv,py+by,pz+bz,sc,ox,oy,hexB,1.6));
  const step=Math.max(stSp*2,0.15);
  for(let xi=stSp;xi<L;xi+=step){const sq=[[cv,cv],[BW-cv,cv],[BW-cv,H-cv],[cv,H-cv],[cv,cv]];for(let i=0;i<4;i++)isoLine(ctx,px+xi,py+sq[i][1],pz+sq[i][0],px+xi,py+sq[i+1][1],pz+sq[i+1][0],sc,ox,oy,hexS,0.85);}
}
function drawScene(ctx,CW,CH,{sloofs,baloks,koloms,plats}){
  ctx.clearRect(0,0,CW,CH);
  const grad=ctx.createLinearGradient(0,0,0,CH);grad.addColorStop(0,"#f5f4ef");grad.addColorStop(1,"#ece9e0");ctx.fillStyle=grad;ctx.fillRect(0,0,CW,CH);
  const ko=koloms[0]||mkKolom(0),sl=sloofs[0]||mkSloof(0),ba=baloks[0]||mkBalok(0),pl=plats[0]||mkPlat(0);
  const kW=+ko.lebar||0.4,kD=+ko.dalam||0.4,kH=+ko.tinggi||3.5;
  const bL=+ba.panjang||6,bW=+ba.lebar||0.3,bH=+ba.tinggi||0.5;
  const sL=+sl.panjang||6,sW=+sl.lebar||0.3,sH=+sl.tinggi||0.5;
  const pT=+pl.tebal||0.12;
  const firstBarJml=g=>+(g.tulanganGroups?.[0]?.jml||4);
  const spanX=Math.max(bL,3),depth=Math.max(sL,3),colH=Math.max(kH,2);
  const extX=spanX+kW,extZ=depth+kD;
  const scW=(extX+extZ)*CX,scH=(extX+extZ)*SX+colH+bH+pT+0.5;
  const sc=Math.min(CW*0.72/scW,CH*0.72/scH);
  const ox=CW*0.5+(extZ-extX)*CX*sc*0.5,oy=CH-(extX+extZ)*SX*sc-CH*0.06;
  ctx.globalAlpha=0.07;
  for(let xi=0;xi<=Math.ceil(spanX+kW);xi++){const[ax,ay]=toS(xi,0,0,sc,ox,oy),[bx,by]=toS(xi,0,depth+kD,sc,ox,oy);ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.strokeStyle="#666";ctx.lineWidth=0.5;ctx.stroke();}
  for(let zi=0;zi<=Math.ceil(depth+kD);zi++){const[ax,ay]=toS(0,0,zi,sc,ox,oy),[bx,by]=toS(spanX+kW,0,zi,sc,ox,oy);ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.strokeStyle="#666";ctx.lineWidth=0.5;ctx.stroke();}
  ctx.globalAlpha=1;
  const szBack=depth+kD/2-sW/2,szFront=kD/2-sW/2;
  drawBeamXIso(ctx,0,0,szBack,spanX+kW,sH,sW,firstBarJml(sl),+sl.sengkang.jarak,sc,ox,oy,"#7a6a9a","#5a4a8a","#9a8aba");
  drawBeamXIso(ctx,0,0,szFront,spanX+kW,sH,sW,firstBarJml(sl),+sl.sengkang.jarak,sc,ox,oy,"#7a6a9a","#5a4a8a","#9a8aba");
  [[spanX,depth],[0,depth],[spanX,0],[0,0]].forEach(([cx,cz])=>drawKolomIso(ctx,cx,cz,kW,kD,colH,firstBarJml(ko),+ko.sengkang.jarak,sc,ox,oy));
  const baY=colH-bH,bzBack=depth+kD/2-bW/2,bzFront=kD/2-bW/2;
  drawBeamXIso(ctx,0,baY,bzBack,spanX+kW,bH,bW,firstBarJml(ba),+ba.sengkang.jarak,sc,ox,oy,"#3a7a5a","#2a5a3a","#5aaa7a");
  drawBeamXIso(ctx,0,baY,bzFront,spanX+kW,bH,bW,firstBarJml(ba),+ba.sengkang.jarak,sc,ox,oy,"#3a7a5a","#2a5a3a","#5aaa7a");
  const plX=kW/2,plZ=kD/2;
  isoBox(ctx,plX,colH,plZ,spanX,pT,depth,sc,ox,oy,"#3a7a9a",0.35);
  if(pl.mode==="wiremesh"){const sp=0.2;for(let xi=sp;xi<spanX;xi+=sp)isoLine(ctx,plX+xi,colH+pT*0.7,plZ,plX+xi,colH+pT*0.7,plZ+depth,sc,ox,oy,"#2a8aaa",0.9);for(let zi=sp;zi<depth;zi+=sp)isoLine(ctx,plX,colH+pT*0.7,plZ+zi,plX+spanX,colH+pT*0.7,plZ+zi,sc,ox,oy,"#2a8aaa",0.9);}
  else{const spX=Math.max(+pl.atas.jarakX,0.1),spZ=Math.max(+pl.atas.jarakY,0.1);for(let xi=spX;xi<spanX;xi+=spX)isoLine(ctx,plX+xi,colH+pT*0.65,plZ,plX+xi,colH+pT*0.65,plZ+depth,sc,ox,oy,"#2a6a8a",0.85);for(let zi=spZ;zi<depth;zi+=spZ)isoLine(ctx,plX,colH+pT*0.65,plZ+zi,plX+spanX,colH+pT*0.65,plZ+zi,sc,ox,oy,"#2a6a8a",0.85);}
  isoText(ctx,spanX/2+kW,colH+pT+0.4,depth/2,"D — Plat","#2d7a9a",11,sc,ox,oy);
  isoText(ctx,spanX+kW+0.15,baY+bH/2,bzFront,"B — Balok","#2d7a4a",11,sc,ox,oy);
  isoText(ctx,spanX+kW+0.15,sH/2,szFront,"A — Sloof","#4a4a6a",11,sc,ox,oy);
  isoText(ctx,spanX+kW/2+0.1,colH*0.5,-0.2,"C — Kolom","#8a7a5a",11,sc,ox,oy);
  ctx.save();ctx.font="10px monospace";ctx.fillStyle="#999";ctx.shadowColor="rgba(255,255,255,0.8)";ctx.shadowBlur=2;
  const dA=(x,y,z,t)=>{const[sx,sy]=toS(x,y,z,sc,ox,oy);ctx.fillText(t,sx,sy);};
  dA(spanX/2,-0.25,0,`span ${spanX.toFixed(1)}m`);dA(-0.2,colH/2,0,`h ${colH.toFixed(1)}m`);ctx.restore();
  [{lbl:`A — ${sloofs.length} Sloof`,c:"#4a4a6a"},{lbl:`B — ${baloks.length} Balok`,c:"#2d7a4a"},{lbl:`C — ${koloms.length} Kolom`,c:"#8a7a5a"},{lbl:`D — ${plats.length} Plat`,c:"#2d7a9a"}].forEach((d,i)=>{
    const x=12,y=CH-16-i*18;ctx.save();ctx.font="bold 11px sans-serif";ctx.fillStyle=d.c;ctx.shadowColor="rgba(255,255,255,0.9)";ctx.shadowBlur=3;ctx.fillText(d.lbl,x,y);ctx.restore();
  });
}

function VisualisasiCanvas({sloofs,baloks,koloms,plats}){
  const ref=useRef(null);
  useEffect(()=>{const cv=ref.current;if(!cv)return;const ctx=cv.getContext("2d");drawScene(ctx,800,480,{sloofs,baloks,koloms,plats});},[sloofs,baloks,koloms,plats]);
  return(
    <div style={{background:"#f0efe9",borderRadius:14,padding:16,border:"1px solid rgba(26,26,26,0.08)"}}>
      <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#7a7a6a",marginBottom:10}}>Visualisasi Axonometrik — Frame Representatif (Elemen Pertama Per Seksi)</div>
      <canvas ref={ref} width={800} height={480} style={{width:"100%",height:"auto",display:"block",borderRadius:10,border:"1px solid rgba(26,26,26,0.07)"}}/>
      <div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
        {[["A","Sloof","#4a4a6a","rgba(74,74,106,0.1)"],["B","Balok","#2d7a4a","rgba(45,122,74,0.1)"],["C","Kolom","#8a7a5a","rgba(138,122,90,0.1)"],["D","Plat","#2d7a9a","rgba(45,122,154,0.1)"]].map(([l,n,c,bg])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:c}}>
            <div style={{width:12,height:12,borderRadius:3,background:bg,border:`1.5px solid ${c}`}}/>
            <span style={{fontWeight:700}}>{l}</span> — {n}
          </div>
        ))}
        <div style={{marginLeft:"auto",fontSize:10,color:"#9a9a8a",fontFamily:"monospace"}}>beton: semi-transparan · besi: solid</div>
      </div>
    </div>
  );
}

function Inp({label,val,onChange,step,min,unit,w}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:w||0}}>
      {label&&<label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#7a7a6a"}}>
        {label}{unit&&<span style={{fontWeight:400,textTransform:"none",color:"#bbb",marginLeft:3}}>{unit}</span>}
      </label>}
      <input type="number" value={val} step={step||"any"} min={min!=null?min:0}
        onChange={e=>onChange(+e.target.value)}
        style={{background:"#e8e7e0",border:"1px solid rgba(26,26,26,0.12)",borderRadius:8,padding:"6px 8px",fontSize:12,fontFamily:"monospace",color:"#1a1a1a",outline:"none",width:"100%",boxSizing:"border-box"}}
        onFocus={e=>e.target.style.boxShadow="0 0 0 3px rgba(26,26,26,0.09)"}
        onBlur={e=>e.target.style.boxShadow="none"}/>
    </div>
  );
}
function Sel({label,val,onChange,opts}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:2}}>
      {label&&<label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#7a7a6a"}}>{label}</label>}
      <select value={val} onChange={e=>onChange(e.target.value)}

function SecRekap({rows,color}){
  if(!rows.length)return null;

  rows.forEach(r=>{const k=`${r.dia}-${r.jenis}`;if(!map[k])map[k]={dia:r.dia,jenis:r.jenis,qty:0,totLen:0,totWt:0};map[k].qty+=(r.n||0);map[k].totLen+=(r.tot||0);map[k].totWt+=(r.totWt||0);});

function Sec({letter,items,setItems,mkItem,children}){
  const meta=META[letter];
  const add=useCallback(()=>setItems(p=>[...p,mkItem(Date.now())]),[setItems,mkItem]);
  let rows=[];
  items.forEach(it=>{
    if(letter==="A"||letter==="B"){
      const c=calcLin(it);
      c.groups.forEach(g=>rows.push({dia:g.dia,jenis:g.jenis,n:g.n,tot:g.tot,totWt:g.totWt}));
      rows.push({dia:+it.sengkang.dia,jenis:it.sengkang.jenis,n:c.stN,tot:c.stTot,totWt:c.stTot*c.sWt});
    }else if(letter==="C"){
      const c=calcKol(it);
      c.groups.forEach(g=>rows.push({dia:g.dia,jenis:g.jenis,n:g.n,tot:g.tot,totWt:g.totWt}));
      rows.push({dia:+it.sengkang.dia,jenis:it.sengkang.jenis,n:c.stN,tot:c.stTot,totWt:c.stTot*c.sWt});
    }else if(letter==="D"){
      const c=calcPlat(it);if(c.mode==="bar"&&c.rows)rows.push(...c.rows);
    }
  });
  return(
    <div style={{background:"#fff",borderRadius:18,boxShadow:"0 3px 18px rgba(0,0,0,0.06)",padding:18,marginBottom:18,border:"1px solid rgba(26,26,26,0.06)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <Badge letter={letter} sz={36}/>
        <div>
          <div style={{fontWeight:800,fontSize:15,color:"#1a1a1a"}}>Seksi {letter} — {meta.label}</div>
          <div style={{fontSize:11,color:"#7a7a6a"}}>{items.length} elemen</div>
        </div>
        <button onClick={add} style={{marginLeft:"auto",background:"#1a1a1a",color:"#f0efe9",border:"none",borderRadius:8,padding:"7px 16px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
          + Tambah {meta.label}
        </button>
      </div>
      {items.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:"#9a9a8a",fontSize:13,background:"#f8f7f3",borderRadius:9,border:"1px dashed rgba(26,26,26,0.12)"}}>Belum ada elemen — klik "+ Tambah" untuk mulai</div>}
      {children}
      {items.length>0&&<SecRekap rows={rows} color={meta.color}/>}
    </div>
  );
}

function SCard({label,val,unit,color="#1a1a1a",dark}){
  return(
    <div style={{background:dark?"#1a1a1a":"#f0efe9",borderRadius:12,padding:"11px 13px",border:dark?"none":"1px solid rgba(26,26,26,0.08)"}}>
      <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:dark?"rgba(240,239,233,0.45)":"#7a7a6a",marginBottom:4}}>{label}</div>
      <div style={{fontFamily:"monospace",fontWeight:600,fontSize:16,color:dark?"#f0efe9":color,lineHeight:1}}>
        {val}<span style={{fontSize:10,fontWeight:400,marginLeft:3,color:dark?"rgba(240,239,233,0.5)":"#aaa"}}>{unit}</span>
      </div>
    </div>
  );
}

const fmtRp=v=>"Rp "+Math.round(v).toLocaleString("id-ID");

function App(){
  const[sloofs,setSloofs]=useState(()=>[mkSloof(1)]);
  const[baloks,setBaloks]=useState(()=>[mkBalok(2)]);
  const[koloms,setKoloms]=useState(()=>[mkKolom(3)]);
  const[plats, setPlats] =useState(()=>[mkPlat(4)]);
  const[tab,setTab]=useState("input");
  const[showSet,setShowSet]=useState(false);
  const[params,setParams]=useState({hBeton:1250000,hBeks:150000,hPly:185000,hMin:35000,hPak:20000,hBesi:14500,hKawat:25000,hUpah:500000,hWM:185000,waste:5,truck:7,reuse:3});
  const P=(k,v)=>setParams(p=>({...p,[k]:v}));

  let vS=0,vB=0,vK=0,vP=0,form=0,wmSh=0;const barRows=[];
  sloofs.forEach(it=>{const c=calcLin(it);vS+=c.vol;form+=c.form;c.groups.forEach(g=>barRows.push({dia:g.dia,jenis:g.jenis,totLen:g.tot,totWt:g.totWt}));barRows.push({dia:+it.sengkang.dia,jenis:it.sengkang.jenis,totLen:c.stTot,totWt:c.stTot*c.sWt});});
  baloks.forEach(it=>{const c=calcLin(it);vB+=c.vol;form+=c.form;c.groups.forEach(g=>barRows.push({dia:g.dia,jenis:g.jenis,totLen:g.tot,totWt:g.totWt}));barRows.push({dia:+it.sengkang.dia,jenis:it.sengkang.jenis,totLen:c.stTot,totWt:c.stTot*c.sWt});});
  koloms.forEach(it=>{const c=calcKol(it);vK+=c.vol;form+=c.form;c.groups.forEach(g=>barRows.push({dia:g.dia,jenis:g.jenis,totLen:g.tot,totWt:g.totWt}));barRows.push({dia:+it.sengkang.dia,jenis:it.sengkang.jenis,totLen:c.stTot,totWt:c.stTot*c.sWt});});
  plats.forEach(it=>{const c=calcPlat(it);vP+=c.vol;form+=c.form;if(c.mode==="bar"&&c.rows)barRows.push(...c.rows.map(r=>({dia:r.dia,jenis:r.jenis,totLen:r.tot,totWt:r.totWt})));if(c.mode==="wm")wmSh+=c.sheets;});

  const vBersih=vS+vB+vK+vP,vOrder=vBersih*(1+params.waste/100);
  const trucks=Math.ceil(vOrder/(params.truck||7));
  const besiTot=barRows.reduce((s,r)=>s+r.totWt,0);
  const kawat=besiTot*0.015,ply=Math.ceil(form/2.88/(params.reuse||1)),minyak=form*0.15,paku=form*0.20;
  const bMap={};barRows.forEach(r=>{const k=`${r.dia}-${r.jenis}`;if(!bMap[k])bMap[k]={dia:r.dia,jenis:r.jenis,totLen:0,totWt:0};bMap[k].totLen+=r.totLen;bMap[k].totWt+=r.totWt;});
  const bGroups=Object.values(bMap).sort((a,b)=>a.dia-b.dia);

  const rab=[
    {u:"Beton Readymix",s:"m³",v:vOrder,h:params.hBeton},{u:"Upah Cor+Vibrator",s:"m³",v:vOrder,h:params.hUpah},
    {u:"Bekisting",s:"m²",v:form,h:params.hBeks},{u:"Plywood 12mm",s:"lbr",v:ply,h:params.hPly},
    {u:"Minyak Bekisting",s:"L",v:minyak,h:params.hMin},{u:"Paku",s:"kg",v:paku,h:params.hPak},
    {u:"Besi Tulangan",s:"kg",v:besiTot,h:params.hBesi},{u:"Kawat Bendrat",s:"kg",v:kawat,h:params.hKawat},
    ...(wmSh>0?[{u:"Wiremesh",s:"lbr",v:wmSh,h:params.hWM}]:[]),

  const doJSON=()=>{

      summary:{vBersih,vOrder,trucks,truckCapacity:params.truck,besiTot,form,totalBtg12m:totalBtg,
        besiPerDia:bGroups.map(g=>({dia:`D${g.dia}`,jenis:g.jenis,totLen:+g.totLen.toFixed(3),totWt:+g.totWt.toFixed(3),btg12m:Math.ceil(g.totLen/12/0.95)}))
      }

    ]);
    const totalBtg=bGroups.reduce((s,g)=>s+Math.ceil(g.totLen/12/0.95),0);
    const rabDataStartRow=4; // row 1=title, 2=blank, 3=header, 4..= data

    X.utils.book_append_sheet(wb,X.utils.aoa_to_sheet([

      ["TOTAL BATANG","","",besiTot,totalBtg,"btg"],[],

    X.writeFile(wb,"pembesian-ics.xlsx");

        </div>

          {[
            {lb:"⚙ Harga Satuan",fn:()=>setShowSet(s=>!s),st:{background:showSet?"#1a1a1a":"transparent",color:showSet?"#f0efe9":"#1a1a1a",border:"1px solid rgba(26,26,26,0.2)"}},
            {lb:"↓ JSON",fn:doJSON,st:{background:"transparent",color:"#4a4a6a",border:"1px solid rgba(74,74,106,0.3)"}},

                  </tbody>

            <div style={{background:"#fff",borderRadius:18,boxShadow:"0 3px 18px rgba(0,0,0,0.07)",padding:20,marginBottom:18,border:"1px solid rgba(26,26,26,0.06)"}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:3}}>Visualisasi Axonometrik Pembesian</div>
              <div style={{fontSize:11,color:"#7a7a6a",marginBottom:16}}>Render otomatis berdasarkan input elemen pertama per seksi · beton semi-transparan · besi solid</div>
              <VisualisasiCanvas sloofs={sloofs} baloks={baloks} koloms={koloms} plats={plats}/>
            </div>
            <div style={{background:"#fff",borderRadius:18,boxShadow:"0 3px 18px rgba(0,0,0,0.07)",padding:20,border:"1px solid rgba(26,26,26,0.06)"}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>Keterangan Elemen</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:10}}>
                {[
                  {l:"A",n:"Sloof",c:"#4a4a6a",it:sloofs[0],desc:s=>`${s.panjang}m × ${s.lebar}×${s.tinggi}m · ${s.tulanganGroups?.length||1} grup tulangan · sengk D${s.sengkang.dia}@${(+s.sengkang.jarak*100).toFixed(0)}cm`},
                  {l:"B",n:"Balok",c:"#2d7a4a",it:baloks[0],desc:s=>`${s.panjang}m × ${s.lebar}×${s.tinggi}m · ${s.tulanganGroups?.length||1} grup tulangan · sengk D${s.sengkang.dia}@${(+s.sengkang.jarak*100).toFixed(0)}cm`},
                  {l:"C",n:"Kolom",c:"#8a7a5a",it:koloms[0],desc:s=>`${s.lebar}×${s.dalam}m · h ${s.tinggi}m · ${s.tulanganGroups?.length||1} grup tulangan · sengk D${s.sengkang.dia}@${(+s.sengkang.jarak*100).toFixed(0)}cm`},
                  {l:"D",n:"Plat", c:"#2d7a9a",it:plats[0], desc:s=>s.mode==="wiremesh"?`${s.panjang}×${s.lebar}m · t=${s.tebal}m · WM ${s.wm.tipe} ${s.wm.lapis}lapis`:`${s.panjang}×${s.lebar}m · t=${s.tebal}m · D${s.atas.dia}@${(+s.atas.jarakX*100).toFixed(0)}cm`},
                ].map(e=>(
                  <div key={e.l} style={{background:"#f8f7f3",borderRadius:11,padding:12,border:`1px solid ${e.c}20`}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><Badge letter={e.l} sz={26}/><span style={{fontWeight:700,fontSize:12,color:e.c}}>{e.n}</span></div>
                    <p style={{fontSize:11,color:"#5a5a5a",lineHeight:1.6,fontFamily:"monospace"}}>{e.it?e.desc(e.it):"—"}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
