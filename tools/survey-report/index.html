<div id="app" class="app"></div>
<script>
const KEY="ics-local-survey-v1";
const DAILY_KEY="ics-daily-report-v1";
const OLD_KEY="ics-local-report-groundup-v2";
const IDB_NAME=`${KEY}-indexed-storage`;
const IDB_STORE="app";
let db={profiles:[],photos:[],reports:[]};
let route="profiles",currentProfileId="",currentPhotoId="",currentReportId="",currentPlanViewId="",returnReportId="";
const HOME_URL=location.pathname.includes("/tools/")?"../../index.html":"./index.html";
const DEFAULT_LOGO_URL=location.pathname.includes("/tools/")?"../../assets/logo.png":"./assets/logo.png";
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const uid=p=>`${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const today=()=>new Date().toISOString().slice(0,10);
const addDays=(v,n)=>{const d=new Date(`${v||today()}T00:00:00`);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const fmtDate=v=>v?new Intl.DateTimeFormat("id-ID",{dateStyle:"medium"}).format(new Date(`${v}T00:00:00`)):"-";
function statusLabel(v){return ({draft:"Draft",final:"Siap Export",revised:"Sudah Direvisi",complete:"Siap Export",project_registered:"Proyek terdaftar di database",added_to_daily_progress:"Proyek sudah terdaftar",survey_only:"Survey saja"}[v]||"Draft")}
const fmtDateTime=v=>new Intl.DateTimeFormat("id-ID",{dateStyle:"medium",timeStyle:"short"}).format(new Date(v));
function fmtFileDate(v){const d=new Date(`${v||today()}T00:00:00`),pad=n=>String(n).padStart(2,"0");return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`}
function cleanFilePart(v){return String(v||"Proyek").replace(/[\\:*?"<>|]/g," ").replace(/\s+/g," ").trim()}
function surveyPdfName(r){return `Survey - ${cleanFilePart(r?.projectNameSnapshot)} - ${fmtFileDate(r?.surveyDate)}`}
function printSurveyPdf(){const r=db.reports.find(x=>x.id===currentReportId)||db.reports.at(-1),oldTitle=document.title;document.title=surveyPdfName(r);document.body.classList.add("printing-report");let done=false;const restore=()=>{if(done)return;done=true;document.title=oldTitle;document.body.classList.remove("printing-report");window.onafterprint=null};window.onafterprint=restore;setTimeout(()=>{window.focus();window.print();setTimeout(restore,60000)},120)}
const fmtPct=v=>Number.isFinite(Number(v))?`${Number(v).toFixed(1).replace(".0","")}%`:"-";
const fmtDelta=v=>Number.isFinite(Number(v))?`${Number(v)>=0?"+":""}${Number(v).toFixed(1).replace(".0","")}%`:"-";
function openStore(mode="readonly"){return new Promise((res,rej)=>{const req=indexedDB.open(IDB_NAME,1);req.onupgradeneeded=()=>req.result.createObjectStore(IDB_STORE);req.onerror=()=>rej(req.error);req.onsuccess=()=>res(req.result.transaction(IDB_STORE,mode).objectStore(IDB_STORE))})}
async function idbGet(){const store=await openStore();return new Promise((res,rej)=>{const req=store.get(KEY);req.onerror=()=>rej(req.error);req.onsuccess=()=>res(req.result)})}
async function idbSet(value){const store=await openStore("readwrite");return new Promise((res,rej)=>{const req=store.put(value,KEY);req.onerror=()=>rej(req.error);req.onsuccess=()=>res(true)})}
async function load(){try{const indexed=await idbGet();const raw=indexed||localStorage.getItem(KEY)||localStorage.getItem(OLD_KEY);db=typeof raw==="string"?JSON.parse(raw):(raw||db);db.profiles ||= [];db.photos ||= [];db.reports ||= [];migrate();validateDbShape(db);save()}catch(e){console.warn(e);db={profiles:[],photos:[],reports:[]}}}
function save(){idbSet(db).catch(e=>console.warn("Penyimpanan IndexedDB gagal",e));try{localStorage.setItem(KEY,JSON.stringify({profiles:db.profiles.map(p=>({...p,companyLogoUrl:p.companyLogoUrl||""})),photos:[],reports:[]}))}catch(e){}return true}
function migrate(){db.profiles.forEach(p=>{if(!Array.isArray(p.plans))p.plans=[]});db.photos.forEach(ph=>{ph.gpsText ||= "";ph.watermarkText ||= ""});db.reports.forEach(r=>{r.followUp ||= "";r.surveyDate ||= r.startDate||today();if(!r.photoSnapshots&&Array.isArray(r.selectedPhotoIds))r.photoSnapshots=r.selectedPhotoIds.map(id=>db.photos.find(p=>p.id===id)).filter(Boolean).map(photoSnapshot)})}
function storageStats(){const used=new Blob([JSON.stringify(db)]).size;return{mb:(used/1024/1024).toFixed(2),pct:Math.min(100,Math.round(used/(5*1024*1024)*100))}}
function validId(v){return /^[a-z]+_[a-z0-9]+_[a-z0-9]+$/.test(String(v||""))}
function validDataUrl(v){return !v||/^data:(image\/(png|jpeg|jpg|webp)|application\/pdf|application\/vnd\.ms-excel|application\/vnd\.openxmlformats-officedocument\.spreadsheetml\.sheet|application\/octet-stream);base64,/i.test(String(v))}
function normalizedType(file){const name=(file?.name||"").toLowerCase();if(file?.type)return file.type;if(name.endsWith(".pdf"))return"application/pdf";if(name.endsWith(".xlsx"))return"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";if(name.endsWith(".xls"))return"application/vnd.ms-excel";return"application/octet-stream"}
function isImageFile(file){return normalizedType(file).startsWith("image/")}
function isPdfFile(file){return normalizedType(file)==="application/pdf"}
function validateDbShape(x){if(!Array.isArray(x.profiles)||!Array.isArray(x.photos)||!Array.isArray(x.reports))throw new Error("Format database tidak valid");if([...x.profiles,...x.photos,...x.reports].some(item=>!validId(item.id)))throw new Error("ID tidak valid");if([...x.photos,...x.reports].some(item=>item.projectId&&!validId(item.projectId)))throw new Error("Relasi proyek tidak valid");if(x.profiles.some(p=>p.companyLogoUrl&&!validDataUrl(p.companyLogoUrl)))throw new Error("Logo tidak valid");if(x.photos.some(p=>!validDataUrl(p.fileUrl)))throw new Error("Foto tidak valid");if(x.reports.some(r=>!validDataUrl(r.companyLogoSnapshot)||(r.photoSnapshots||[]).some(p=>!validDataUrl(p.fileUrl))))throw new Error("Report snapshot tidak valid")}
function profile(id=currentProfileId){return db.profiles.find(p=>p.id===id)}
function photos(pid=currentProfileId){return db.photos.filter(p=>p.projectId===pid).sort((a,b)=>(a.photoNumber||0)-(b.photoNumber||0))}
function reports(pid=currentProfileId){return db.reports.filter(r=>r.projectId===pid)}
function nextPhoto(pid){return photos(pid).reduce((m,p)=>Math.max(m,p.photoNumber||0),0)+1}
function plans(){return []}
function planById(){return null}

function bindMarkerDrag(plan,ph,onSave=()=>{}){if(!plan||!ph)return;const surface=$(".plan-surface",plan)||plan;const setFrom=e=>{const r=surface.getBoundingClientRect();ph.planX=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));ph.planY=Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));renderPin(ph)};surface.onclick=e=>{if(e.target.classList.contains("pin"))return;setFrom(e);onSave()};const pin=$(`[data-pin="${ph.id}"]`,surface);if(!pin)return;pin.onpointerdown=e=>{e.preventDefault();e.stopPropagation();plan.classList.add("dragging");pin.setPointerCapture(e.pointerId);const move=m=>setFrom(m);const up=()=>{plan.classList.remove("dragging");pin.removeEventListener("pointermove",move);onSave()};pin.addEventListener("pointermove",move);pin.addEventListener("pointerup",up,{once:true});pin.addEventListener("pointercancel",up,{once:true})}}

function photoWatermark(ph){return ph.watermarkText||`${compactDateTime(ph.takenAt||new Date())} | ${compactLocation(ph.gpsText)}`}
function compactDateTime(v){const d=new Date(v);const pad=n=>String(n).padStart(2,"0");return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${String(d.getFullYear()).slice(-2)} ${pad(d.getHours())}:${pad(d.getMinutes())}`}
function compactLocation(v){const raw=String(v||"").replace(/^(gps|alamat|lokasi)\s*:?\s*/i,"").trim();if(!raw)return"Alamat/GPS -";const street=streetFromAddress(raw);if(street)return street;const nums=raw.match(/-?\d+(?:\.\d+)?/g);if(nums&&nums.length>=2)return`${Number(nums[0]).toFixed(5)},${Number(nums[1]).toFixed(5)}`;return trimCompact(raw,44)}
function streetFromAddress(v){const clean=String(v||"").replace(/-?\d+\.\d+\s*,\s*-?\d+\.\d+/g,"").replace(/\s+/g," ").trim();if(!clean)return"";const pieces=clean.split(/[|;\n,]/).map(x=>x.trim()).filter(Boolean);const streetLike=/(^|\b)(jl\.?|jalan|gg\.?|gang|komplek|komp\.?|perumahan|perum\.?|ruko|blok)\b/i;let hit=pieces.find(x=>streetLike.test(x))||"";if(!hit&&streetLike.test(clean))hit=clean.split(/(?:\bkel\.?|\bkelurahan|\bkec\.?|\bkecamatan|\bkota|\bkab\.?|\bkabupaten|\bprov\.?|\bprovinsi|\bindonesia)\b/i)[0].trim();if(!hit&&pieces[0]&&/[a-z]/i.test(pieces[0])&&!/^-?\d/.test(pieces[0]))hit=pieces[0];hit=hit.replace(/\b(rt|rw)\s*\.?\s*\d+.*$/i,"").replace(/\b(kel\.?|kelurahan|kec\.?|kecamatan|kota|kab\.?|kabupaten|prov\.?|provinsi|indonesia)\b.*$/i,"").replace(/\b\d{5}\b/g,"").replace(/\s{2,}/g," ").replace(/\s*[-,]\s*$/,"").trim();return trimCompact(hit,44)}
function trimCompact(v,max=44){const s=String(v||"").trim();return s.length>max?s.slice(0,max-3).trim()+"...":s}
function photoSnapshot(ph){return{id:ph.id,projectId:ph.projectId,photoNumber:ph.photoNumber,fileUrl:ph.fileUrl,takenAt:ph.takenAt,description:ph.description,locationLabel:ph.locationLabel,category:ph.category,gpsText:ph.gpsText,watermarkText:photoWatermark(ph)}}

function bindReportForm(){const sel=$("#projectSelect");if(sel&&!sel.disabled)sel.onchange=()=>go("report",{profileId:sel.value});const f=$("#reportForm");if(!f)return;const editing=db.reports.find(x=>x.id===currentReportId);f.onsubmit=async e=>{e.preventDefault();const fd=new FormData(f);const projectId=fd.get("projectId")||fd.get("projectIdFixed")||editing?.projectId;const p=profile(projectId);if(!p)return;const selected=fd.getAll("selectedPhotoIds").sort((a,b)=>(Number(fd.get(`order_${a}`))||9999)-(Number(fd.get(`order_${b}`))||9999));const snappedPhotos=selected.map(id=>db.photos.find(ph=>ph.id===id)).filter(Boolean).map(photoSnapshot);const warnings=[];if(!snappedPhotos.length)warnings.push("Belum ada foto yang dipilih.");if(snappedPhotos.some(ph=>!ph.description))warnings.push("Ada foto tanpa deskripsi.");if(snappedPhotos.some(ph=>!ph.locationLabel))warnings.push("Ada foto tanpa lokasi/area.");if(fd.get("status")==="final"&&warnings.length){alert("Status final wajib lengkap:\n- "+warnings.join("\n- "));return}if(warnings.length&&!confirm("Ada warning sebelum preview:\n- "+warnings.join("\n- ")+"\n\nLanjut buat preview?"))return;const payload={projectId:p.id,projectNameSnapshot:p.projectName,projectLocationSnapshot:p.projectLocation,ownerNameSnapshot:p.ownerName,clientNameSnapshot:p.clientName,estimatorNameSnapshot:p.estimatorName,teamNameSnapshot:p.teamName,companyNameSnapshot:p.companyName||"IC Solution",companyLogoSnapshot:p.companyLogoUrl||"",picNameSnapshot:p.picName||"",picContactSnapshot:p.picContact||"",surveyDate:fd.get("surveyDate")||today(),summary:fd.get("summary"),notes:fd.get("notes"),followUp:fd.get("followUp"),selectedPhotoIds:selected,photoSnapshots:snappedPhotos,status:fd.get("status"),updatedAt:new Date().toISOString()};const r=editing?Object.assign(editing,payload):{id:uid("report"),...payload,createdAt:new Date().toISOString()};if(!editing)db.reports.push(r);currentReportId=r.id;if(save())go("preview",{reportId:r.id,profileId:p.id})}}
function viewPreview(){const r=db.reports.find(x=>x.id===currentReportId)||db.reports.at(-1);if(!r)return missing();const ps=(r.photoSnapshots&&r.photoSnapshots.length?r.photoSnapshots:(r.selectedPhotoIds||[]).map(id=>db.photos.find(p=>p.id===id)).filter(Boolean).map(photoSnapshot));return `<section><div class="toolbar no-print"><div class="title"><h1>Preview Laporan</h1><p>Laporan memakai data proyek dan foto saat preview dibuat.</p></div><div class="nav"><button class="btn" onclick="go('reports')">Kembali</button><button class="btn" onclick="go('report',{reportId:'${r.id}',profileId:'${r.projectId}'})">Revisi Survey</button><button class="btn" onclick="go('report')">Buat Survey Baru</button><button class="btn primary" onclick="printSurveyPdf()">Export / Simpan PDF</button></div></div><div class="print-tip no-print"><strong>Untuk Android:</strong> pilih Print / Cetak -> Save as PDF -> ukuran kertas A4 -> orientasi Portrait -> aktifkan Background graphics jika tersedia. Nama file otomatis: <b>${esc(surveyPdfName(r))}</b>.</div><div class="card pad no-print" style="margin-bottom:14px"><h2>Cek Sebelum Export</h2><div class="qc">${qc(r,ps).map(x=>`<div class="${x.ok?"":"bad"}"><span>${x.label}</span><strong>${x.ok?"OK":"Warning"}</strong></div>`).join("")}</div></div><div class="report-pages">${reportPages(r,ps)}</div></section>`}
function qc(r,ps){return[{label:"Data proyek tersimpan",ok:!!r.projectNameSnapshot},{label:"Tanggal survey terisi",ok:!!r.surveyDate},{label:"Foto dipilih",ok:ps.length>0},{label:"Semua foto punya lokasi/area",ok:ps.every(p=>!!p.locationLabel)},{label:"Semua foto punya deskripsi",ok:ps.every(p=>!!p.description)}]}
function reportPages(r,ps){const chunks=[];for(let i=0;i<Math.max(ps.length,1);i+=3){const group=ps.slice(i,i+3);while(group.length<3)group.push(null);chunks.push(group)}return `<section class="paper cover">${r.companyLogoSnapshot?`<img class="cover-logo" src="${r.companyLogoSnapshot}" alt="Logo">`:`<img class="cover-logo" src="${DEFAULT_LOGO_URL}" alt="Logo">`}<div><div class="kicker">Laporan Survey</div><h1>Laporan Survey Proyek</h1><h2>${esc(r.projectNameSnapshot)}</h2></div><div class="cover-grid"><div class="cover-box"><small>Tanggal survey</small><strong>${fmtDate(r.surveyDate)}</strong></div><div class="cover-box"><small>Lokasi</small><strong>${esc(r.projectLocationSnapshot||"-")}</strong></div><div class="cover-box"><small>Owner/client</small><strong>${esc(r.ownerNameSnapshot||r.clientNameSnapshot||"-")}</strong></div><div class="cover-box"><small>Surveyor</small><strong>${esc(r.estimatorNameSnapshot||"-")}</strong></div><div class="cover-box"><small>Dibuat oleh</small><strong>${esc(r.teamNameSnapshot||"-")}</strong></div><div class="cover-box"><small>Tanggal dibuat</small><strong>${fmtDate(today())}</strong></div></div>${footerHtml(r)}</section>${summaryPages(r)}${chunks.map((g,i)=>`<section class="paper"><div class="kicker">Dokumentasi Survey</div><h2>Foto Survey - Halaman ${i+1}</h2>${g.map(p=>photoReportBlock(p,r)).join("")}${footerHtml(r)}</section>`).join("")}`}
function summaryPages(r){const cards=summaryCards(r);const pages=[];pages.push(summaryPaper(r,false,cards.splice(0,2)));while(cards.length)pages.push(summaryPaper(r,true,cards.splice(0,2)));return pages.join("")}
function summaryCards(r){return[{title:"Hasil Survey",text:r.summary||"-"},{title:"Notes / Logs / Kendala",text:r.notes||"-"},{title:"Follow-up / Tindak Lanjut",text:r.followUp||"-"}].flatMap(s=>splitText(s.text,760).map((text,i)=>({title:i?`${s.title} (lanjutan)`:s.title,text})))}
function progressCard(r){return ""}
function summaryPaper(r,continued,cards){return `<section class="paper"><h2>${continued?"Hasil Survey - Lanjutan":"Hasil Survey"}</h2><p>${fmtDate(r.surveyDate)}</p>${cards.map(c=>`<div class="summary-card"><h3>${esc(c.title)}</h3><p>${esc(c.text)}</p></div>`).join("")}${footerHtml(r)}</section>`}
function splitText(v,max=760){const s=String(v||"-").trim()||"-";if(s.length<=max)return[s];const parts=[];let rest=s;while(rest.length>max){let cut=rest.lastIndexOf("\n",max);if(cut<max*.45)cut=rest.lastIndexOf(". ",max);if(cut<max*.45)cut=rest.lastIndexOf(" ",max);if(cut<max*.45)cut=max;parts.push(rest.slice(0,cut).trim());rest=rest.slice(cut).trim()}if(rest)parts.push(rest);return parts}
function attachmentPreview(a){if(!a)return `<div class="attachment-box"><div><strong>Belum ada lampiran</strong><p>Upload PDF/Excel/image jika diperlukan sebagai data pendukung survey.</p></div></div>`;const type=a.type||"";if(type.startsWith("image/"))return `<div class="progress-embed"><img src="${a.url}" alt="${esc(a.name)}"></div>`;if(type.includes("pdf"))return `<div class="progress-embed"><embed src="${a.url}" type="application/pdf"></div>`;return `<div class="attachment-box"><div><strong>${esc(a.name)}</strong><p>File tersimpan sebagai lampiran lokal.</p></div></div>`}
function attachmentRef(a){return a?`<p style="margin-top:10px;color:#747061">Lampiran: ${esc(a.name)}</p>`:""}
function footerHtml(r){return `<footer class="pdf-footer"><span>IC Solution</span><span>${esc(r.projectNameSnapshot||"Survey")}</span><span>${fmtDate(r.surveyDate||today())}</span></footer>`}
function planReportPage(pl,ps,r){return ""}
function photoReportBlock(p,r){if(!p)return `<article class="photo-block photo-empty"><div></div><div></div></article>`;return `<article class="photo-block"><div class="photo-frame"><img src="${p.fileUrl}"><div class="watermark">${esc(p.watermarkText||photoWatermark(p))}</div></div><div><h3>Foto No. ${String(p.photoNumber).padStart(2,"0")}</h3><p><b>Tanggal:</b> ${fmtDateTime(p.takenAt)}</p><p><b>Lokasi:</b> ${esc(p.locationLabel||"-")}</p><p><b>Kategori:</b> ${esc(p.category||"-")}</p><p><b>Deskripsi:</b><br>${esc(p.description||"-")}</p></div></article>`}
function missing(){return `<section><div class="card empty"><h3>Data tidak ditemukan</h3><p>Kembali ke Project Profile.</p></div></section>`}
async function addPhotos(files){const p=profile();if(!p)return;for(const file of Array.from(files)){db.photos.push({id:uid("photo"),projectId:p.id,photoNumber:nextPhoto(p.id),fileUrl:await imageToData(file,1000,.74),takenAt:new Date().toISOString(),gpsText:"",description:"",locationLabel:"",category:"Survey",createdAt:new Date().toISOString()})}save();render()}
function deletePhoto(id){if(!confirm("Hapus foto ini? Laporan lama tetap aman karena menyimpan data saat laporan dibuat."))return;db.photos=db.photos.filter(p=>p.id!==id);save();go("photos")}
function deleteReport(id){if(!confirm("Hapus report dari archive lokal?"))return;db.reports=db.reports.filter(r=>r.id!==id);save();go("reports")}
function injectProjectToDaily(id=currentProfileId){
  const p=profile(id);
  if(!p){alert("Data proyek survey tidak ditemukan.");return}
  let daily={projects:[],dailyReports:[],weeklyReports:[]};
  try{const raw=localStorage.getItem(DAILY_KEY);if(raw)daily=JSON.parse(raw)}catch(e){console.warn(e)}
  daily.projects ||= [];daily.dailyReports ||= [];daily.weeklyReports ||= [];
  const surveyPic=p.estimatorName||p.picName||"";
  const mapped={id:`survey:${p.id}`,sourceProfileId:p.id,name:p.projectName,location:p.projectLocation||"",owner:p.ownerName||p.clientName||"",estimator:surveyPic,pic:surveyPic,team:p.teamName||"Tim ICS",source:"survey-report",updatedAt:new Date().toISOString()};
  const oldExternal=daily.projects.find(x=>x.id===p.id&&x.source==="survey-report");
  if(oldExternal){daily.dailyReports.forEach(r=>{if(r.projectId===oldExternal.id)r.projectId=mapped.id});daily.weeklyReports.forEach(w=>{if(w.projectId===oldExternal.id)w.projectId=mapped.id});Object.assign(oldExternal,mapped)}
  else{const existing=daily.projects.find(x=>x.id===mapped.id);if(existing)Object.assign(existing,mapped);else daily.projects.push({...mapped,createdAt:p.createdAt||new Date().toISOString()})}
  const surveyReports=reports(p.id);
  let syncedReports=0,syncedPhotos=0;
  surveyReports.forEach(sr=>{
    const sourcePhotos=(sr.photoSnapshots&&sr.photoSnapshots.length?sr.photoSnapshots:(sr.selectedPhotoIds||[]).map(pid=>db.photos.find(ph=>ph.id===pid)).filter(Boolean).map(photoSnapshot));
    const dailyPhotos=sourcePhotos.map((ph,i)=>({id:`survey_${ph.id||i}`,number:i+1,url:ph.fileUrl,caption:ph.description||ph.locationLabel||"",takenAt:ph.takenAt||sr.surveyDate||new Date().toISOString(),includeWeekly:true,source:"survey-report",sourcePhotoId:ph.id||""})).filter(ph=>ph.url);
    const dailyId=`daily_survey_${String(sr.id||sr.surveyDate).replace(/[^a-z0-9_]/gi,"_")}`;
    const area=sourcePhotos.map(ph=>ph.locationLabel).filter(Boolean)[0]||p.projectLocation||"Survey";
    const progress=sr.summary||"Hasil survey tersinkron dari Survey Report.";
    const kendala=sr.notes||"";
    const payload={id:dailyId,projectId:mapped.id,date:sr.surveyDate||today(),weather:"Survey",workHours:"",area,documentationMeta:{weather:"Survey",workHours:"",area},progress,progressText:progress,progressValue:"",manpower:"",equipment:"",materials:"",kendala,issues:kendala,instructions:"",safetyNotes:"",followUp:sr.followUp||"",notes:`Source: Survey Report ${fmtDate(sr.surveyDate||today())}`,photos:dailyPhotos,status:sr.status==="final"?"complete":"draft",source:"survey-report",sourceSurveyReportId:sr.id,updatedAt:new Date().toISOString(),createdAt:sr.createdAt||new Date().toISOString()};
    const existing=daily.dailyReports.find(r=>r.sourceSurveyReportId===sr.id||r.id===dailyId);
    if(existing)Object.assign(existing,payload);else daily.dailyReports.push(payload);
    syncedReports++;syncedPhotos+=dailyPhotos.length;
  });
  localStorage.setItem(DAILY_KEY,JSON.stringify(daily));
  alert(`Proyek "${p.projectName}" sudah diupdate ke Daily Report. ${syncedReports} survey report dan ${syncedPhotos} foto ikut disinkronkan.`)
}
function exportBackup(){const blob=new Blob([JSON.stringify({...db,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`ics-report-backup-${today()}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function restoreBackup(file){if(!file)return;try{const incoming=JSON.parse(await file.text());incoming.profiles ||= [];incoming.photos ||= [];incoming.reports ||= [];db={profiles:incoming.profiles,photos:incoming.photos,reports:incoming.reports};migrate();validateDbShape(db);if(!confirm("Restore akan mengganti database lokal di browser ini. Lanjut?"))return;save();currentProfileId=db.profiles[0]?.id||"";currentReportId="";go("profiles")}catch(e){alert(`Restore gagal: ${e.message}`)}}
function fileToData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{let out=String(r.result||"");if(out.startsWith("data:;base64,"))out=out.replace("data:;base64,",`data:${normalizedType(file)};base64,`);res(out)};r.onerror=rej;r.readAsDataURL(file)})}
function imageToData(file,max=1000,q=.74){return new Promise((res,rej)=>{const r=new FileReader();r.onerror=rej;r.onload=()=>{const im=new Image();im.onerror=rej;im.onload=()=>{const s=Math.min(1,max/Math.max(im.naturalWidth,im.naturalHeight));const c=document.createElement("canvas");c.width=Math.max(1,Math.round(im.naturalWidth*s));c.height=Math.max(1,Math.round(im.naturalHeight*s));c.getContext("2d").drawImage(im,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",q))};im.src=r.result};r.readAsDataURL(file)})}
document.addEventListener("change",e=>{if(e.target.id==="photoCameraInput"||e.target.id==="photoUploadInput")addPhotos(e.target.files);if(e.target.id==="restoreInput")restoreBackup(e.target.files?.[0])});
load().then(render);
</script>
